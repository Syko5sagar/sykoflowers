<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
 background:#000;
 color:#fff;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.box{
 background:#111;
 padding:25px;
 border-radius:20px;
 width:320px;
 text-align:center;
 border:2px solid #32cd32;
}

img{
 width:90px;height:90px;border-radius:50%;margin-bottom:10px;
}

input{
 width:100%;
 padding:10px;
 margin:8px 0;
 background:#000;
 border:1px solid red;
 color:#fff;
 border-radius:10px;
}

button{
 width:100%;
 padding:12px;
 background:#32cd32;
 border:none;
 border-radius:10px;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h3>Profile</h3>

<input type="file" id="fileInput">
<img id="preview">

<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">
<input type="number" id="rate" placeholder="Rate">

<button id="save">SAVE</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user, img="";

onAuthStateChanged(auth,(u)=>{
 if(!u){ location.href="index.html"; return;}
 user=u;
});

fileInput.onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
 };
 r.readAsDataURL(f);
};

save.onclick=async()=>{
 if(!user) return;

 await setDoc(doc(db,"users",user.uid),{
  name:name.value,
  age:age.value,
  rate:rate.value,
  profilePic:img,
  isOnline:true
 });

 location.href="live.html";
};
</script>

</body>
</html>
