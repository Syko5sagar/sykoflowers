<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
 background:#000;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

/* CONTAINER */
.box{
 width:90%;
 max-width:400px;
 padding:25px;
 border-radius:25px;
 border:2px solid #00ff00;
 text-align:center;
}

/* TITLE */
h2{
 margin-bottom:20px;
}

/* PHOTO */
.photo{
 width:110px;
 height:110px;
 border-radius:50%;
 background:#222;
 margin:0 auto 20px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 overflow:hidden;
 border:2px dashed red;
}

.photo img{
 width:100%;
 height:100%;
 object-fit:cover;
 display:none;
}

.photo i{
 font-size:35px;
 color:#00ff00;
}

/* INPUT */
input,select{
 width:100%;
 padding:12px;
 margin:10px 0;
 border-radius:10px;
 border:1px solid red;
 background:#000;
 color:white;
}

/* BUTTON */
button{
 width:100%;
 padding:15px;
 background:#00ff00;
 border:none;
 border-radius:10px;
 font-weight:bold;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Profile</h2>

<!-- PHOTO -->
<div class="photo" onclick="fileInput.click()">
 <i id="icon">📷</i>
 <img id="preview">
</div>

<input type="file" id="fileInput" hidden accept="image/*">

<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">
<input type="number" id="rate" placeholder="Rate">

<button onclick="saveProfile()">NEXT</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let userId=null;
let imageData="";

// LOGIN CHECK
onAuthStateChanged(auth,user=>{
 if(user){
  userId=user.uid;
 }else{
  location.href="index.html";
 }
});

// IMAGE SELECT
fileInput.addEventListener("change",e=>{
 const file=e.target.files[0];
 if(!file) return;

 const reader=new FileReader();
 reader.onload=()=>{
  imageData=reader.result;
  preview.src=imageData;
  preview.style.display="block";
  icon.style.display="none";
 };
 reader.readAsDataURL(file);
});

// SAVE PROFILE
window.saveProfile = async ()=>{
 const name=document.getElementById("name").value;
 const age=document.getElementById("age").value;
 const rate=document.getElementById("rate").value;

 if(!name || !age || !rate || !imageData){
  alert("Fill all");
  return;
 }

 await setDoc(doc(db,"users",userId),{
  uid:userId,
  name:name,
  age:age,
  rate:rate,
  profilePic:imageData,
  isOnline:true,
  createdAt:Date.now()
 });

 // ✅ NEXT → LIVE PAGE
 window.location.href="live.html";
};
</script>

</body>
</html>
