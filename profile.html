<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
 background:#000;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
 padding:20px;
}

/* CONTAINER */
.upload-container{
 width:100%;
 max-width:400px;
 background:#111;
 padding:30px;
 border-radius:25px;
 border:2px solid #32cd32;
 text-align:center;
 box-shadow:0 0 30px rgba(50,205,50,0.2);
}

h2{
 color:#ff0000;
 margin-bottom:25px;
 text-transform:uppercase;
 font-size:18px;
}

/* PHOTO */
.photo-upload{
 width:110px;
 height:110px;
 background:#222;
 border:2px dashed #ff0000;
 border-radius:50%;
 margin:0 auto 25px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 overflow:hidden;
 position:relative;
 transition:.3s;
}

.photo-upload:hover{
 transform:scale(1.05);
}

.photo-upload img{
 width:100%;
 height:100%;
 object-fit:cover;
 position:absolute;
}

.photo-upload i{
 font-size:35px;
 color:#32cd32;
}

/* INPUTS */
.input-group{
 margin-bottom:15px;
 text-align:left;
}

label{
 display:block;
 color:#32cd32;
 font-size:13px;
 margin-bottom:5px;
 font-weight:600;
}

input,select{
 width:100%;
 padding:12px;
 background:#000;
 border:1px solid #ff0000;
 border-radius:12px;
 color:white;
 outline:none;
 transition:.2s;
}

input:focus,select:focus{
 border-color:#32cd32;
 box-shadow:0 0 10px rgba(50,205,50,0.3);
}

/* BUTTON */
.save-btn{
 width:100%;
 padding:15px;
 background:#32cd32;
 color:#000;
 border:none;
 border-radius:12px;
 font-weight:800;
 font-size:18px;
 cursor:pointer;
 margin-top:10px;
 transition:.3s;
}

.save-btn:hover{
 transform:scale(1.03);
 box-shadow:0 0 15px rgba(50,205,50,0.6);
}
</style>
</head>

<body>

<div class="upload-container">

<h2>ಪ್ರೊಫೈಲ್ ಸೆಟ್ ಮಾಡಿ</h2>

<div class="photo-upload" onclick="fileInput.click()">
 <i class="fa-solid fa-camera" id="camIcon"></i>
 <img id="previewImg" style="display:none;">
</div>

<input type="file" id="fileInput" hidden accept="image/*">

<div class="input-group">
<label>ಹೆಸರು:</label>
<input type="text" id="userName">
</div>

<div class="input-group">
<label>ಲಿಂಗ:</label>
<select id="userGender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="input-group">
<label>ವಯಸ್ಸು:</label>
<input type="number" id="userAge">
</div>

<div class="input-group">
<label>ಬಾಡಿಗೆ (₹):</label>
<input type="number" id="userRate">
</div>

<button class="save-btn" id="saveBtn">ಸೇವ್ ಮಾಡಿ</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;
let base64Image="";

// USER LOAD FIX
onAuthStateChanged(auth,user=>{
 if(user){
  currentUser=user;
 }else{
  alert("Login first");
  location.href="index.html";
 }
});

// IMAGE
fileInput.onchange=e=>{
 const file=e.target.files[0];
 const reader=new FileReader();
 reader.onload=()=>{
  base64Image=reader.result;
  previewImg.src=base64Image;
  previewImg.style.display="block";
  camIcon.style.display="none";
 };
 reader.readAsDataURL(file);
};

// SAVE
saveBtn.onclick=async()=>{
 if(!currentUser){
  alert("Wait...");
  return;
 }

 const name=userName.value.trim();
 const age=userAge.value;
 const rate=userRate.value;
 const gender=userGender.value;

 if(!name || !age || !rate || !base64Image){
  alert("ಎಲ್ಲ ವಿವರ ತುಂಬಿ");
  return;
 }

 saveBtn.innerText="Saving...";

 await setDoc(doc(db,"users",currentUser.uid),{
  uid:currentUser.uid,
  name,age,rate,gender,
  profilePic:base64Image,
  isOnline:true,
  createdAt:Date.now()
 });

 location.href="live-user.html";
};
</script>

</body>
</html>
