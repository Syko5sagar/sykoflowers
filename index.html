<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent bf/gf - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .syko-container { display: flex; gap: 12px; }
        .syko-letter { font-size: 55px; font-weight: 800; color: #fff; opacity: 0; transform: translateY(10px); animation: letterAppear 0.6s ease-out forwards; }
        .syko-letter:nth-child(1) { animation-delay: 0.2s; } .syko-letter:nth-child(2) { animation-delay: 0.4s; }
        .syko-letter:nth-child(3) { animation-delay: 0.6s; } .syko-letter:nth-child(4) { animation-delay: 0.8s; }
        @keyframes letterAppear { 100% { opacity: 1; transform: translateY(0); text-shadow: 0 0 12px rgba(255, 255, 255, 0.4); } }
        .fade-out { animation: finalFade 0.6s ease-in forwards; animation-delay: 2.2s; }
        @keyframes finalFade { to { opacity: 0; visibility: hidden; } }
        #main-content { opacity: 0; display: none; width: 100%; justify-content: center; transition: 0.8s; }
        #main-content.active { opacity: 1; display: flex; }
        .container { background: rgba(15, 15, 15, 0.95); padding: 50px 40px; border-radius: 35px; width: 380px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.08); }
        .header-icon { font-size: 70px; background: linear-gradient(135deg, #ff007f 0%, #7000ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        .special-r { font-family: 'Playfair Display', serif; font-size: 65px; font-style: italic; background: linear-gradient(135deg, #ff007f, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text { font-size: 28px; text-transform: lowercase; color: #aaa; }
        .btn-google { width: 100%; padding: 16px; border-radius: 18px; border: none; background: #fff; color: #000; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 35px; }
    </style>
</head>
<body>
    <div id="splash-screen" class="fade-out">
        <div class="syko-container"><span class="syko-letter">S</span><span class="syko-letter">Y</span><span class="syko-letter">K</span><span class="syko-letter">O</span></div>
    </div>
    <div id="main-content">
        <div class="container">
            <i class="fa-solid fa-heart-pulse header-icon"></i>
            <div class="logo"><span class="special-r">R</span><span class="logo-text">ent bf/gf</span></div>
            <p style="color:#666; font-size: 13px;">ಮುಂದುವರಿಯಲು ಲಾಗಿನ್ ಆಗಿ</p>
            <button class="btn-google" id="googleBtn">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20" style="margin-right:10px;">
                Google ಮೂಲಕ ಲಾಗಿನ್ ಆಗಿ
            </button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", authDomain: "sykolive-846a3.firebaseapp.com", projectId: "sykolive-846a3" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'flex';
                setTimeout(() => main.classList.add('active'), 50);
            }, 2800);
        });

        document.getElementById('googleBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(() => { window.location.href = "home.html"; })
            .catch(err => alert("Error: " + err.message));
        });
    </script>
</body>
</html>
