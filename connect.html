<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call</title>

<style>
body{background:#000;color:#fff;margin:0;font-family:sans-serif}

#ringBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.accept{background:green;color:#fff}
.reject{background:red;color:#fff}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

#local{
width:110px;
height:150px;
position:absolute;
top:20px;
right:20px;
border:2px solid #fff;
border-radius:10px;
}
</style>
</head>

<body>

<div id="ringBox">
<h2 id="statusText">Incoming Call...</h2>

<button class="accept" onclick="acceptCall()">Accept</button>
<button class="reject" onclick="rejectCall()">Reject</button>
</div>

<video id="remote" autoplay playsinline></video>
<video id="local" autoplay playsinline muted></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
onSnapshot,
updateDoc,
deleteDoc,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
});

const db = getFirestore(app);

const pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;

const params = new URLSearchParams(location.search);
const roomId = params.get("room");

const roomRef = doc(db,"calls",roomId);

// ================= CHECK CALL STATUS =================
onSnapshot(roomRef,(snap)=>{
const data = snap.data();

// 🔥 CALLING STATE (ringing)
if(data?.status === "calling"){
document.getElementById("statusText").innerText =
"📞 Call from: " + data.caller;
}

// 🔥 ACCEPTED STATE
if(data?.status === "accepted"){
document.getElementById("ringBox").style.display="none";
startCall();
}
});

// ================= ACCEPT =================
window.acceptCall = async()=>{

await updateDoc(roomRef,{
status:"accepted"
});
};

// ================= REJECT =================
window.rejectCall = async()=>{

await updateDoc(roomRef,{
status:"rejected"
});

location.href="live.html";
};

// ================= START WEBRTC =================
async function startCall(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("local").srcObject = localStream;

localStream.getTracks().forEach(track=>{
pc.addTrack(track, localStream);
});

pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};

// ICE
pc.onicecandidate = async(e)=>{
if(e.candidate){
await addDoc(collection(roomRef,"candidates"),{
candidate:e.candidate.toJSON()
});
}
};

// OFFER/ANSWER sync
onSnapshot(roomRef,async(snap)=>{
const data = snap.data();

if(data?.offer && !pc.currentRemoteDescription){
await pc.setRemoteDescription(data.offer);

const answer = await pc.createAnswer();
await pc.setLocalDescription(answer);

await updateDoc(roomRef,{
answer:answer
});
}
});

}

</script>

</body>
</html>
