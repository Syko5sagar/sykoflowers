<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <title>Private Call</title>
    <style>
        body { background: #000; margin: 0; color: #32cd32; font-family: sans-serif; text-align: center; }
        video { width: 100%; height: 45vh; background: #111; object-fit: cover; border-bottom: 1px solid #32cd32; }
        .controls { padding: 20px; }
        .timer { font-size: 20px; color: red; margin: 10px; }
        .btn { padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .end { background: red; color: white; }
    </style>
</head>
<body>

    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted style="width: 30%; position: absolute; top: 10px; right: 10px; border: 2px solid #32cd32; height: auto;"></video>

    <div class="timer" id="timer">05:00</div>

    <div class="controls">
        <button class="btn end" onclick="location.href='live-user.html'">END CALL</button>
    </div>

    <script type="module">
        // WebRTC ಲಾಜಿಕ್ ಇಲ್ಲಿ ಬರುತ್ತದೆ 
        // ಇದು Firebase Signaling ಮೂಲಕ ಇಬ್ಬರ ಕ್ಯಾಮೆರಾವನ್ನು ಪರಸ್ಪರ ಕನೆಕ್ಟ್ ಮಾಡುತ್ತದೆ.
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        let localStream;
        let peerConnection;

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        async function init() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;

            // 5 ನಿಮಿಷದ ಟೈಮರ್
            let timeLeft = 300;
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    let m = Math.floor(timeLeft/60), s = timeLeft%60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                } else {
                    alert("ಸಮಯ ಮುಗಿದಿದೆ, ಪಾವತಿಸಿ!");
                    location.href = 'live-user.html';
                }
            }, 1000);
        }

        init();
    </script>
</body>
</html>
