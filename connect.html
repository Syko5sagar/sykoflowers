<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call</title>

<style>
body{
 margin:0;
 background:black;
 color:white;
 font-family:sans-serif;
 overflow:hidden;
}

/* REMOTE FULL */
#remote{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
}

/* LOCAL SMALL */
#local{
 position:fixed;
 width:120px;
 height:160px;
 bottom:90px;
 right:10px;
 border-radius:10px;
 border:2px solid white;
 object-fit:cover;
}

/* CONTROLS */
.controls{
 position:fixed;
 bottom:20px;
 width:100%;
 display:flex;
 justify-content:center;
 gap:20px;
}

.controls button{
 width:60px;
 height:60px;
 border-radius:50%;
 border:none;
 font-size:20px;
}

.end{background:red;color:white}
</style>
</head>

<body>

<video id="remote" autoplay playsinline></video>
<video id="local" autoplay muted playsinline></video>

<div class="controls">
 <button class="end" onclick="endCall()">❌</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);

// URL PARAMS
const params=new URLSearchParams(location.search);
const room=params.get("room");
const isCaller=params.get("caller");

const pc=new RTCPeerConnection({
 iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

// MEDIA
const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
local.srcObject=stream;
stream.getTracks().forEach(track=>pc.addTrack(track,stream));

// REMOTE
pc.ontrack=e=>{
 remote.srcObject=e.streams[0];
};

// FIRESTORE REFS
const roomRef=doc(db,"rooms",room);
const iceRef=collection(db,"rooms",room,"ice");

// ICE SEND
pc.onicecandidate=async e=>{
 if(e.candidate){
  await addDoc(iceRef,e.candidate.toJSON());
 }
};

// ICE RECEIVE
onSnapshot(iceRef,snap=>{
 snap.docChanges().forEach(change=>{
  if(change.type==="added"){
   pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
  }
 });
});

// CALLER
if(isCaller){

 const offer=await pc.createOffer();
 await pc.setLocalDescription(offer);

 await setDoc(roomRef,{offer});

 onSnapshot(roomRef,async snap=>{
  const data=snap.data();
  if(data?.answer && !pc.currentRemoteDescription){
   await pc.setRemoteDescription(data.answer);
  }
 });

}else{

 const roomData=(await getDoc(roomRef)).data();

 await pc.setRemoteDescription(roomData.offer);

 const answer=await pc.createAnswer();
 await pc.setLocalDescription(answer);

 await updateDoc(roomRef,{answer});
}

// END
window.endCall=()=>{
 location.href="live.html";
};
</script>

</body>
</html>
