<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connect - RENT BF</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        body { background: #000; color: #32cd32; font-family: 'Poppins', sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        #video-grid { flex: 1; background: #111; position: relative; }
        .controls { height: 80px; background: #000; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid #222; }
        .btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; color: white; }
        .hangup { background: #ff0000; }
        .mute { background: #444; }
        .chat-toggle { background: #007bff; }
        
        .timer { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 18px; border-radius: 30px; color: #ff3e3e; font-weight: bold; z-index: 10; border: 1px solid #ff3e3e; font-size: 14px; display: none; }
        
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .loader { border: 4px solid #111; border-top: 4px solid #32cd32; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .pay-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 150; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .pay-card { background: #111; padding: 35px; border-radius: 25px; border: 2px solid #32cd32; width: 85%; max-width: 350px; }
        .pay-btn { background: #32cd32; color: #000; padding: 15px; display: block; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div id="loadingStatus">ಕ್ಯಾಮರಾ ಪರ್ಮಿಷನ್ ನೀಡಿ...</div>
    </div>

    <div id="video-grid">
        <div class="timer" id="freeTimer">05:00 ಫ್ರೀ ಸಮಯ</div>
        <div id="jitsi-container" style="height: 100%; width: 100%;"></div>
    </div>

    <div class="pay-overlay" id="payOverlay">
        <div class="pay-card">
            <h3>ಸಮಯ ಮುಗಿದಿದೆ!</h3>
            <p>ಮುಂದೆ ವೀಕ್ಷಿಸಲು ₹5 ಪಾವತಿಸಿ</p>
            <a href="upi://pay?pa=sagarbssagarbs231@oksbi&pn=Sagar&am=5&cu=INR" class="pay-btn" onclick="resumeCall()">PAY NOW ₹5</a>
            <button onclick="exitCall()" style="background:none; border:none; color:#ff4d4d; margin-top:20px; cursor: pointer;">EXIT</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn mute" onclick="toggleMute()"><i class="fa-solid fa-microphone" id="micIcon"></i></button>
        <button class="btn chat-toggle" onclick="toggleChat()"><i class="fa-solid fa-comments"></i></button>
        <button class="btn hangup" onclick="exitCall()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
            authDomain: "sykolive-846a3.firebaseapp.com", 
            projectId: "sykolive-846a3" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const type = params.get('type'); 
        const mode = params.get('mode'); 
        const targetUid = params.get('targetUid');
        const roomID = params.get('roomID') || "ROOM_" + Math.random().toString(36).substring(7);

        let api = null;

        async function startConnection() {
            try {
                if (type === 'call' && mode === 'caller') {
                    await setDoc(doc(db, "calls", targetUid), {
                        fromName: params.get('myName'),
                        roomID: roomID,
                        status: "pending",
                        time: Date.now()
                    });
                }

                const options = {
                    roomName: roomID,
                    parentNode: document.querySelector('#jitsi-container'),
                    configOverwrite: {
                        prejoinPageEnabled: false,
                        startWithAudioMuted: (type === 'chat'),
                        startWithVideoMuted: (type === 'chat'),
                        disableDeepLinking: true
                    }
                };

                // Jitsi API ಲೋಡ್ ಆಗಿದೆಯೇ ಎಂದು ಪರೀಕ್ಷಿಸಿ ರನ್ ಮಾಡುವುದು
                if (window.JitsiMeetExternalAPI) {
                    api = new JitsiMeetExternalAPI("meet.jit.si", options);
                    
                    api.addEventListener('videoConferenceJoined', () => {
                        document.getElementById('loadingScreen').style.display = 'none';
                        if (type === 'call') {
                            document.getElementById('freeTimer').style.display = 'block';
                            startTimer();
                        } else {
                            document.getElementById('freeTimer').style.display = 'block';
                            document.getElementById('freeTimer').innerText = "FREE CHAT ACTIVE";
                            document.getElementById('freeTimer').style.color = "#007bff";
                            document.getElementById('freeTimer').style.borderColor = "#007bff";
                        }
                    });

                    // ಕ್ಯಾಮೆರಾ ಪರ್ಮಿಷನ್ ಬ್ಲಾಕ್ ಆದರೆ ತಿಳಿಸಲು
                    api.addEventListener('cameraError', () => {
                        alert("ಕ್ಯಾಮರಾ ಪರ್ಮಿಷನ್ ನಿರಾಕರಿಸಲಾಗಿದೆ. ದಯವಿಟ್ಟು ಬ್ರೌಸರ್ ಸೆಟ್ಟಿಂಗ್ಸ್‌ನಲ್ಲಿ ಅನುಮತಿ ನೀಡಿ.");
                    });

                } else {
                    document.getElementById('loadingStatus').innerText = "API ಲೋಡ್ ಆಗಿಲ್ಲ, ದಯವಿಟ್ಟು ರಿಫ್ರೆಶ್ ಮಾಡಿ.";
                }

            } catch (error) {
                console.error("Error:", error);
                alert("ಕನೆಕ್ಷನ್ ಸಮಸ್ಯೆ ಉಂಟಾಗಿದೆ.");
            }
        }

        function startTimer() {
            let totalSeconds = 300; 
            const timerEl = document.getElementById('freeTimer');
            const interval = setInterval(() => {
                totalSeconds--;
                let mins = Math.floor(totalSeconds / 60);
                let secs = totalSeconds % 60;
                timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')} ಫ್ರೀ ಸಮಯ`;
                if (totalSeconds <= 0) {
                    clearInterval(interval);
                    showPayment();
                }
            }, 1000);
        }

        function showPayment() {
            document.getElementById('payOverlay').style.display = 'flex';
            api.executeCommand('toggleAudio');
            api.executeCommand('toggleVideo');
        }

        window.toggleMute = () => api.executeCommand('toggleAudio');
        window.toggleChat = () => api.executeCommand('toggleChat');
        window.resumeCall = () => {
            document.getElementById('payOverlay').style.display = 'none';
            api.executeCommand('toggleAudio');
            api.executeCommand('toggleVideo');
            document.getElementById('freeTimer').innerText = "PREMIUM ACTIVE";
            document.getElementById('freeTimer').style.color = "#32cd32";
        };

        window.exitCall = async () => {
            if(api) api.dispose();
            if(targetUid && mode === 'caller') await deleteDoc(doc(db, "calls", targetUid));
            window.location.href = "live-user.html";
        };

        // ಪೇಜ್ ಲೋಡ್ ಆದ ತಕ್ಷಣ ರನ್ ಮಾಡಿ
        window.onload = startConnection;
    </script>
</body>
</html>
