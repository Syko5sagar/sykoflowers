<!DOCTYPE html>
<html>
<body style="background:black">

<video id="local" autoplay muted style="width:45%"></video>
<video id="remote" autoplay style="width:45%"></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSy...",
 projectId:"sykolive-846a3"
});

const db=getFirestore(app);

const params=new URLSearchParams(location.search);
const room=params.get("room");
const caller=params.get("caller");

const pc=new RTCPeerConnection({
 iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

const localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
local.srcObject=localStream;

localStream.getTracks().forEach(track=>pc.addTrack(track,localStream));

pc.ontrack=e=>{
 remote.srcObject=e.streams[0];
};

const roomRef=doc(db,"rooms",room);
const iceRef=collection(roomRef,"ice");

// ICE SEND
pc.onicecandidate=e=>{
 if(e.candidate){
  addDoc(iceRef,{candidate:e.candidate});
 }
};

// ICE RECEIVE
onSnapshot(iceRef,snap=>{
 snap.docChanges().forEach(change=>{
  if(change.type==="added"){
   pc.addIceCandidate(change.doc.data().candidate);
  }
 });
});

// CALLER
if(caller){

 const offer=await pc.createOffer();
 await pc.setLocalDescription(offer);
 await setDoc(roomRef,{offer});

 onSnapshot(roomRef,async s=>{
  const data=s.data();
  if(data?.answer){
   await pc.setRemoteDescription(data.answer);
  }
 });

// RECEIVER
}else{

 const data=(await getDoc(roomRef)).data();
 await pc.setRemoteDescription(data.offer);

 const answer=await pc.createAnswer();
 await pc.setLocalDescription(answer);

 await updateDoc(roomRef,{answer});
}
</script>

</body>
</html>
