<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call</title>

<style>
body{background:#000;margin:0;overflow:hidden}
video{position:absolute;width:100%;height:100%;object-fit:cover}

#local{
width:110px;height:150px;
position:absolute;top:20px;right:20px;
border-radius:10px;border:2px solid #fff;
z-index:10;
}

.controls{
position:absolute;bottom:30px;width:100%;
display:flex;justify-content:center;gap:20px;
z-index:10;
}

button{
width:60px;height:60px;border-radius:50%;
border:none;font-size:20px;
}

.end{background:red;color:#fff;}
.action{background:#333;color:#fff;}
</style>
</head>

<body>

<video id="remote" autoplay playsinline></video>
<video id="local" autoplay playsinline muted></video>

<div class="controls">
<button class="action" onclick="switchCamera()">🔄</button>
<button class="end" onclick="endCall()">📞</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
onSnapshot,
collection,
addDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
});

const db = getFirestore(app);

const pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;
let useFront = true;

const params = new URLSearchParams(location.search);
const roomId = params.get("room");
const isCaller = params.get("caller") === "true";

const roomRef = doc(db,"calls",roomId);

// ================= CAMERA =================
async function init(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("local").srcObject = localStream;

localStream.getTracks().forEach(track=>{
pc.addTrack(track, localStream);
});

pc.ontrack = (event)=>{
document.getElementById("remote").srcObject = event.streams[0];
};

// ================= ICE =================
pc.onicecandidate = async(event)=>{
if(event.candidate){
await addDoc(collection(roomRef,
isCaller ? "callerCandidates" : "calleeCandidates"
),{
candidate:event.candidate.toJSON()
});
}
};

// ================= CALLER =================
if(isCaller){

const offer = await pc.createOffer();
await pc.setLocalDescription(offer);

await setDoc(roomRef,{
offer:offer,
status:"calling"
},{merge:true});

// answer listener
onSnapshot(roomRef,(snap)=>{
const data = snap.data();
if(data?.answer && !pc.currentRemoteDescription){
pc.setRemoteDescription(new RTCSessionDescription(data.answer));
}
});

// callee candidates
onSnapshot(collection(roomRef,"calleeCandidates"),snap=>{
snap.docChanges().forEach(c=>{
if(c.type==="added"){
pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate));
}
});
});

}

// ================= RECEIVER =================
else{

onSnapshot(roomRef,async(snap)=>{
const data = snap.data();

if(data?.offer && !pc.currentRemoteDescription){

await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

const answer = await pc.createAnswer();
await pc.setLocalDescription(answer);

await setDoc(roomRef,{
answer:answer,
status:"connected"
},{merge:true});
}
});

// caller candidates
onSnapshot(collection(roomRef,"callerCandidates"),snap=>{
snap.docChanges().forEach(c=>{
if(c.type==="added"){
pc.addIceCandidate(new RTCIceCandidate(c.doc.data().candidate));
}
});
});
}

}

init();

// ================= SWITCH CAMERA =================
window.switchCamera = async()=>{

useFront = !useFront;

localStream.getTracks().forEach(t=>t.stop());

localStream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:useFront?"user":"environment"},
audio:true
});

const track = localStream.getVideoTracks()[0];
const sender = pc.getSenders().find(s=>s.track.kind==="video");

if(sender) sender.replaceTrack(track);

document.getElementById("local").srcObject = localStream;
};

// ================= END CALL =================
window.endCall = async()=>{

if(localStream){
localStream.getTracks().forEach(t=>t.stop());
}

try{
await deleteDoc(roomRef);
}catch(e){}

location.href="live.html";
};

window.addEventListener("beforeunload",async()=>{
try{ await deleteDoc(roomRef); }catch(e){}
});

</script>

</body>
</html>
