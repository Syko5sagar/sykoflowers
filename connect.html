<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connect Call</title>
<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

header{
padding:10px;
background:linear-gradient(45deg,#ff0066,#ff6600);
font-weight:bold;
}

video{
width:45%;
margin:10px;
border:2px solid #00ff99;
border-radius:10px;
}

#popup{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:20px;
border-radius:10px;
}
button{
padding:10px;
margin:5px;
}
</style>
</head>

<body>

<header>📞 CONNECTING CALL</header>

<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>

<div id="popup">
<div class="box">
<h3>📞 Incoming Call</h3>
<p id="callerText"></p>
<button onclick="acceptCall()">✅ Accept</button>
<button onclick="rejectCall()">❌ Reject</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* URL DATA */
let url = new URLSearchParams(location.search);
let room = url.get("room");
let role = url.get("role");
let uid;
let peer;
let localStream;

const servers = {
iceServers:[
{ urls:"stun:stun.l.google.com:19302" }
]
};

/* CAMERA */
async function openCamera(){
localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = localStream;
}

/* INIT */
onAuthStateChanged(auth, async(user)=>{

if(!user){
alert("Login required");
return;
}

uid = user.uid;

await openCamera();

peer = new RTCPeerConnection(servers);

/* add tracks */
localStream.getTracks().forEach(t=>{
peer.addTrack(t, localStream);
});

/* remote stream */
peer.ontrack = (e)=>{
document.getElementById("remoteVideo").srcObject = e.streams[0];
};

/* ICE candidates */
peer.onicecandidate = async(event)=>{
if(event.candidate){
await updateDoc(doc(db,"calls",room),{
candidate:event.candidate
});
}
};

/* LISTEN CALL DATA */
onSnapshot(doc(db,"calls",room),(snap)=>{
let data = snap.data();
if(!data) return;

/* OFFER → receiver */
if(data.offer && role==="receiver"){
peer.setRemoteDescription(data.offer);
showPopup(data.caller);
}

/* ANSWER → caller */
if(data.answer && role==="caller"){
peer.setRemoteDescription(data.answer);
}

/* ICE */
if(data.candidate){
peer.addIceCandidate(data.candidate);
}
});

/* CALL FLOW */
if(role==="caller"){
startCall();
}

});

/* START CALL (CALLER) */
async function startCall(){

let offer = await peer.createOffer();
await peer.setLocalDescription(offer);

await setDoc(doc(db,"calls",room),{
offer:offer,
status:"ringing"
},{merge:true});

}

/* ACCEPT CALL (RECEIVER) */
window.acceptCall = async ()=>{

document.getElementById("popup").style.display="none";

let answer = await peer.createAnswer();
await peer.setLocalDescription(answer);

await updateDoc(doc(db,"calls",room),{
answer:answer,
status:"connected"
});
};

/* REJECT */
window.rejectCall = async ()=>{

document.getElementById("popup").style.display="none";

await updateDoc(doc(db,"calls",room),{
status:"rejected"
});

};

/* POPUP */
function showPopup(caller){
document.getElementById("popup").style.display="flex";
document.getElementById("callerText").innerText =
"From: " + caller;
}

</script>

</body>
</html>
