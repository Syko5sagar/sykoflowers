<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #jitsi-container { flex: 1; background: #111; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .controls { height: 80px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #000; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; color: white; }
        .hangup { background: #ff0000; }
        .mute { background: #444; }
        .timer { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 30px; border: 1px solid red; color: red; font-weight: bold; z-index: 50; }
    </style>
</head>
<body>

    <div class="loading" id="loader">ಕಾಲ್ ಕನೆಕ್ಟ್ ಆಗುತ್ತಿದೆ...</div>
    <div class="timer" id="freeTimer" style="display:none;">05:00 ಫ್ರೀ ಸಮಯ</div>
    <div id="jitsi-container"></div>

    <div class="controls">
        <button class="btn mute" onclick="api.executeCommand('toggleAudio')"><i class="fa-solid fa-microphone"></i></button>
        <button class="btn hangup" onclick="exitCall()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
            authDomain: "sykolive-846a3.firebaseapp.com", 
            projectId: "sykolive-846a3" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode'); 
        const type = params.get('type');
        const roomID = params.get('roomID');
        const targetUid = params.get('targetUid');

        window.api = null;

        async function start() {
            if (mode === 'caller' && type === 'call') {
                // Firebase ನಲ್ಲಿ ಕಾಲ್ ಡೇಟಾ ಹಾಕು (Y ಗೆ ತಿಳಿಯಲು)
                await setDoc(doc(db, "calls", targetUid), {
                    fromName: params.get('myName'),
                    roomID: roomID,
                    status: "pending",
                    time: Date.now()
                });
            }

            const options = {
                roomName: roomID,
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: { 
                    prejoinPageEnabled: false,
                    startWithAudioMuted: false,
                    disableDeepLinking: true
                },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['chat'] }
            };

            window.api = new JitsiMeetExternalAPI("meet.jit.si", options);

            window.api.addEventListener('videoConferenceJoined', () => {
                document.getElementById('loader').style.display = 'none';
                if (type === 'call') {
                    document.getElementById('freeTimer').style.display = 'block';
                    runTimer();
                }
            });
        }

        function runTimer() {
            let timeLeft = 300; 
            const timerEl = document.getElementById('freeTimer');
            const interval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s} ಫ್ರೀ ಸಮಯ`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    alert("ಸಮಯ ಮುಗಿದಿದೆ! ಪೇಮೆಂಟ್ ಮಾಡಿ.");
                    exitCall();
                }
            }, 1000);
        }

        window.exitCall = async () => {
            if (window.api) window.api.dispose();
            if (targetUid) await deleteDoc(doc(db, "calls", targetUid));
            window.location.href = "live-user.html";
        };

        window.onload = start;
    </script>
</body>
</html>
