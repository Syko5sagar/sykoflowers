<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call</title>

<style>
body{background:#000;color:#fff;margin:0;font-family:sans-serif;overflow:hidden}
#ringBox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);padding:20px;border-radius:10px;display:none}
video{width:100%;height:100%;object-fit:cover;position:absolute}
#local{width:120px;height:160px;position:absolute;top:20px;right:20px;border:2px solid #fff;border-radius:10px}
button{padding:10px;margin:5px}
.accept{background:green;color:#fff}
.reject{background:red;color:#fff}
</style>
</head>

<body>

<div id="ringBox">
<h3>Incoming Call</h3>
<button class="accept" onclick="acceptCall()">Accept</button>
<button class="reject" onclick="rejectCall()">Reject</button>
</div>

<video id="remote" autoplay playsinline></video>
<video id="local" autoplay playsinline muted></video>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
onSnapshot,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// 🔥 FIREBASE
const firebaseConfig = {
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= PARAMS =================
const p = new URLSearchParams(location.search);

const roomId = p.get("room");
const myId = p.get("id");
const role = p.get("role");
const to = p.get("to");

const roomRef = doc(db,"calls",roomId);

const pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let stream;

// ================= LISTEN =================
onSnapshot(roomRef,(snap)=>{

if(!snap.exists()) return;

let data = snap.data();

if(role==="receiver" && data.status==="calling"){
document.getElementById("ringBox").style.display="block";
}

if(data.status==="rejected" || data.status==="ended"){
location.href="live.html";
}

if(role==="caller" && data.status==="accepted"){
startCaller();
}
});

// ================= CALLER =================
async function startCaller(){

stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("local").srcObject = stream;

stream.getTracks().forEach(t=>pc.addTrack(t,stream));

pc.onicecandidate = async(e)=>{
if(e.candidate){
await addDoc(collection(roomRef,"callerCandidates"),{
candidate:e.candidate.toJSON()
});
}
};

let offer = await pc.createOffer();
await pc.setLocalDescription(offer);

await setDoc(roomRef,{
offer:offer
},{merge:true});

pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};
}

// ================= RECEIVER =================
async function startReceiver(){

stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
document.getElementById("local").srcObject = stream;

stream.getTracks().forEach(t=>pc.addTrack(t,stream));

let snap = await getDoc(roomRef);
let data = snap.data();

await pc.setRemoteDescription(data.offer);

let answer = await pc.createAnswer();
await pc.setLocalDescription(answer);

await updateDoc(roomRef,{
answer:answer,
status:"accepted"
});

pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};
}

// ================= BUTTONS =================
window.acceptCall = async()=>{
document.getElementById("ringBox").style.display="none";
await startReceiver();
};

window.rejectCall = async()=>{
await updateDoc(roomRef,{status:"rejected"});
location.href="live.html";
};

</script>

</body>
</html>
