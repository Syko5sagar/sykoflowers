<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call</title>

<style>
body{
background:#000;
color:#fff;
margin:0;
font-family:sans-serif;
overflow:hidden;
}

#ringBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:15px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.accept{background:green;color:#fff}
.reject{background:red;color:#fff}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:#000;
}

#local{
width:120px;
height:160px;
position:absolute;
top:20px;
right:20px;
border:2px solid #fff;
border-radius:10px;
object-fit:cover;
z-index:10;
}
</style>
</head>

<body>

<div id="ringBox">
<h2 id="statusText">Waiting...</h2>
<button class="accept" onclick="acceptCall()">Accept</button>
<button class="reject" onclick="rejectCall()">Reject</button>
</div>

<video id="remote" autoplay playsinline></video>
<video id="local" autoplay playsinline muted></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
onSnapshot,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH",
projectId:"YOUR_PROJECT_ID"
});

const db = getFirestore(app);

// ================= ROOM =================
const params = new URLSearchParams(location.search);

const roomId = params.get("room");
const myId = params.get("id");   // A or B
const role = params.get("role"); // caller / receiver

const roomRef = doc(db,"calls",roomId);

// ================= PEER =================
const pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;

// ================= LISTEN CALL =================
onSnapshot(roomRef,(snap)=>{
const data = snap.data();

if(!data) return;

// incoming call
if(data.status === "calling" && role==="receiver"){
document.getElementById("statusText").innerText =
"📞 Incoming call from " + data.caller;
}

// accepted
if(data.status === "accepted"){
document.getElementById("ringBox").style.display="none";
startCall();
}

// rejected
if(data.status === "rejected"){
alert("Call Ended");
location.reload();
}
});

// ================= CALL INIT (A SIDE) =================
async function startCaller(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,audio:true
});

document.getElementById("local").srcObject = localStream;

localStream.getTracks().forEach(track=>{
pc.addTrack(track, localStream);
});

// ICE
pc.onicecandidate = async(e)=>{
if(e.candidate){
await addDoc(collection(roomRef,"candidates"),{
candidate:e.candidate.toJSON()
});
}
};

// OFFER
const offer = await pc.createOffer();
await pc.setLocalDescription(offer);

await setDoc(roomRef,{
caller: myId,
receiver: params.get("to"),
status:"calling",
offer: offer
});

// ANSWER LISTEN
onSnapshot(roomRef, async(snap)=>{
const data = snap.data();

if(data?.answer && !pc.currentRemoteDescription){
await pc.setRemoteDescription(data.answer);
}
});

// REMOTE STREAM
pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};
}

// ================= CALL START (B SIDE) =================
async function startCall(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,audio:true
});

document.getElementById("local").srcObject = localStream;

localStream.getTracks().forEach(track=>{
pc.addTrack(track, localStream);
});

// ICE
pc.onicecandidate = async(e)=>{
if(e.candidate){
await addDoc(collection(roomRef,"candidates"),{
candidate:e.candidate.toJSON()
});
}
};

// OFFER → ANSWER
const snap = await getDoc(roomRef);
const data = snap.data();

if(data?.offer){
await pc.setRemoteDescription(data.offer);

const answer = await pc.createAnswer();
await pc.setLocalDescription(answer);

await updateDoc(roomRef,{
answer: answer,
status:"accepted"
});
}

// remote video
pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};
}

// ================= ACCEPT =================
window.acceptCall = async()=>{
await updateDoc(roomRef,{
status:"accepted"
});
};

// ================= REJECT =================
window.rejectCall = async()=>{
await updateDoc(roomRef,{
status:"rejected"
});
location.href="live.html";
};

// ================= AUTO START =================
if(role === "caller"){
startCaller();
}

</script>

</body>
</html>
