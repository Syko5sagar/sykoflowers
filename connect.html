<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h2>Video Call</h2>

<video id="local" autoplay muted style="width:45%"></video>
<video id="remote" autoplay style="width:45%"></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app=initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 projectId:"sykolive-846a3"
});

const db=getFirestore(app);

const params=new URLSearchParams(location.search);
const room=params.get("room");
const caller=params.get("caller");

const pc=new RTCPeerConnection({
 iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

// CAMERA
const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
local.srcObject=stream;

stream.getTracks().forEach(t=>pc.addTrack(t,stream));

// REMOTE
pc.ontrack=e=>remote.srcObject=e.streams[0];

const roomRef=doc(db,"calls",room);
const callerIce=collection(db,"calls",room,"caller");
const receiverIce=collection(db,"calls",room,"receiver");

// SEND ICE
pc.onicecandidate=e=>{
 if(e.candidate){
  if(caller){
   addDoc(callerIce,{c:e.candidate.toJSON()});
  }else{
   addDoc(receiverIce,{c:e.candidate.toJSON()});
  }
 }
};

// RECEIVE ICE
if(caller){
 onSnapshot(receiverIce,snap=>{
  snap.docChanges().forEach(c=>{
   if(c.type==="added"){
    pc.addIceCandidate(c.doc.data().c);
   }
  });
 });
}else{
 onSnapshot(callerIce,snap=>{
  snap.docChanges().forEach(c=>{
   if(c.type==="added"){
    pc.addIceCandidate(c.doc.data().c);
   }
  });
 });
}

// CALLER
if(caller){
 const offer=await pc.createOffer();
 await pc.setLocalDescription(offer);

 await setDoc(roomRef,{
  offer:{type:offer.type,sdp:offer.sdp}
 });

 onSnapshot(roomRef,snap=>{
  const d=snap.data();
  if(d?.answer){
   pc.setRemoteDescription(new RTCSessionDescription(d.answer));
  }
 });

// RECEIVER
}else{
 const snap=await getDoc(roomRef);
 const data=snap.data();

 await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

 const answer=await pc.createAnswer();
 await pc.setLocalDescription(answer);

 await updateDoc(roomRef,{
  answer:{type:answer.type,sdp:answer.sdp}
 });
}
</script>

</body>
</html>
