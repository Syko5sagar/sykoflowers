<!DOCTYPE html>
<html>
<body style="background:black">

<video id="local" autoplay muted style="width:45%"></video>
<video id="remote" autoplay style="width:45%"></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params=new URLSearchParams(location.search);
const room=params.get("room");
const isCaller=params.get("caller");

const pc=new RTCPeerConnection({
 iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

const localVideo=document.getElementById("local");
const remoteVideo=document.getElementById("remote");

const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
localVideo.srcObject=stream;

stream.getTracks().forEach(t=>pc.addTrack(t,stream));

pc.ontrack=e=>{
 remoteVideo.srcObject=e.streams[0];
};

const roomRef=doc(db,"rooms",room);
const candidatesRef=collection(db,"rooms",room,"candidates");

// SEND ICE
pc.onicecandidate=e=>{
 if(e.candidate){
  addDoc(candidatesRef,e.candidate.toJSON());
 }
};

// RECEIVE ICE
onSnapshot(candidatesRef,snap=>{
 snap.docChanges().forEach(c=>{
  if(c.type==="added"){
   pc.addIceCandidate(new RTCIceCandidate(c.doc.data()));
  }
 });
});

if(isCaller){
 const offer=await pc.createOffer();
 await pc.setLocalDescription(offer);

 await setDoc(roomRef,{offer});

 onSnapshot(roomRef,async s=>{
  const data=s.data();
  if(data?.answer){
   await pc.setRemoteDescription(data.answer);
  }
 });
}else{
 const snap=await getDoc(roomRef);
 const data=snap.data();

 await pc.setRemoteDescription(data.offer);

 const answer=await pc.createAnswer();
 await pc.setLocalDescription(answer);

 await updateDoc(roomRef,{answer});
}
</script>

</body>
</html>
