<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Call Connect</title>

<style>
body{
background:#000;
color:#fff;
margin:0;
font-family:sans-serif;
overflow:hidden;
}

#ringBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:rgba(0,0,0,0.75);
padding:20px;
border-radius:15px;
display:none;
z-index:20;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.accept{background:green;color:#fff}
.reject{background:red;color:#fff}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
background:#000;
}

#local{
width:120px;
height:160px;
position:absolute;
top:20px;
right:20px;
border:2px solid #fff;
border-radius:10px;
object-fit:cover;
z-index:10;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:15;
}

.ctrlBtn{
background:#222;
color:#fff;
padding:10px;
border-radius:50%;
margin:5px;
}
</style>
</head>

<body>

<div id="ringBox">
<h2 id="statusText">Incoming Call...</h2>
<button class="accept" onclick="acceptCall()">Accept</button>
<button class="reject" onclick="rejectCall()">Reject</button>
</div>

<video id="remote" autoplay playsinline></video>
<video id="local" autoplay playsinline muted></video>

<div id="controls">
<button class="ctrlBtn" onclick="switchCamera()">🔄</button>
<button class="ctrlBtn" onclick="endCall()">❌</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
onSnapshot,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
});

const db = getFirestore(app);

// ================= URL =================
const params = new URLSearchParams(location.search);

const roomId = params.get("room");
const myId = params.get("id");
const role = params.get("role"); // caller / receiver
const to = params.get("to");

const roomRef = doc(db,"calls",roomId);

// ================= WEBRTC =================
const pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;
let facingMode = "user";

// ================= SAFE SNAPSHOT =================
onSnapshot(roomRef,(snap)=>{
if(!snap.exists()) return;

const data = snap.data();

// 🔔 ONLY RECEIVER POPUP
if(role === "receiver" && data.status === "calling"){
document.getElementById("ringBox").style.display="block";
document.getElementById("statusText").innerText =
"📞 Call from " + data.caller;
}

// ❌ REJECT / END → BACK
if(data.status === "rejected" || data.status === "ended"){
location.href="live.html";
}

// ✅ CALLER CONNECT AFTER ACCEPT
if(role === "caller" && data.status === "accepted"){
startCallerWebRTC();
}
});

// ================= CALLER =================
async function startCallerWebRTC(){

localStream = await navigator.mediaDevices.getUserMedia({
video:{facingMode},
audio:true
});

document.getElementById("local").srcObject = localStream;

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

pc.onicecandidate = async(e)=>{
if(e.candidate){
await addDoc(collection(roomRef,"callerCandidates"),{
candidate:e.candidate.toJSON()
});
}
};

const offer = await pc.createOffer();
await pc.setLocalDescription(offer);

await setDoc(roomRef,{
caller:myId,
receiver:to,
status:"calling",
offer:offer
});

onSnapshot(roomRef,async(snap)=>{
const data = snap.data();
if(data?.answer && !pc.currentRemoteDescription){
await pc.setRemoteDescription(data.answer);
}
});

pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};
}

// ================= RECEIVER =================
async function startReceiverWebRTC(){

localStream = await navigator.mediaDevices.getUserMedia({
video:{facingMode},
audio:true
});

document.getElementById("local").srcObject = localStream;

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

pc.onicecandidate = async(e)=>{
if(e.candidate){
await addDoc(collection(roomRef,"calleeCandidates"),{
candidate:e.candidate.toJSON()
});
}
};

const snap = await getDoc(roomRef);
const data = snap.data();

if(data?.offer){
await pc.setRemoteDescription(data.offer);

const answer = await pc.createAnswer();
await pc.setLocalDescription(answer);

await updateDoc(roomRef,{
answer:answer,
status:"accepted"
});
}

pc.ontrack = (e)=>{
document.getElementById("remote").srcObject = e.streams[0];
};
}

// ================= ACCEPT =================
window.acceptCall = async()=>{
document.getElementById("ringBox").style.display="none";
await updateDoc(roomRef,{status:"accepted"});
startReceiverWebRTC();
};

// ================= REJECT =================
window.rejectCall = async()=>{
await updateDoc(roomRef,{status:"rejected"});
location.href="live.html";
};

// ================= END CALL =================
window.endCall = async()=>{
await updateDoc(roomRef,{status:"ended"});
location.href="live.html";
};

// ================= CAMERA SWITCH =================
window.switchCamera = async()=>{

facingMode = (facingMode === "user") ? "environment" : "user";

if(localStream){
localStream.getTracks().forEach(t=>t.stop());
}

if(role === "caller"){
startCallerWebRTC();
}else{
startReceiverWebRTC();
}
};

// ================= AUTO START CALLER =================
if(role === "caller"){
startCallerWebRTC();
}

</script>

</body>
</html>
