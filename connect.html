<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  onSnapshot, collection, addDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
  projectId:"sykolive-846a3"
});

const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const room = params.get("room");
const caller = params.get("caller");

const pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

// VIDEO ELEMENTS
const localVideo = document.getElementById("local");
const remoteVideo = document.getElementById("remote");

// CAMERA + MIC
const stream = await navigator.mediaDevices.getUserMedia({
  video: true,
  audio: true
});

localVideo.srcObject = stream;
stream.getTracks().forEach(track => pc.addTrack(track, stream));

// REMOTE STREAM
pc.ontrack = e => {
  remoteVideo.srcObject = e.streams[0];
};

// 🔥 ICE CANDIDATES SEND
const roomRef = doc(db, "rooms", room);
const callerCandidates = collection(roomRef, "callerCandidates");
const calleeCandidates = collection(roomRef, "calleeCandidates");

pc.onicecandidate = async event => {
  if (event.candidate) {
    if (caller) {
      await addDoc(callerCandidates, event.candidate.toJSON());
    } else {
      await addDoc(calleeCandidates, event.candidate.toJSON());
    }
  }
};

// CALLER
if (caller) {
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await setDoc(roomRef, { offer });

  onSnapshot(roomRef, async snap => {
    const data = snap.data();
    if (data?.answer && !pc.currentRemoteDescription) {
      await pc.setRemoteDescription(data.answer);
    }
  });

  // GET CALLEE ICE
  onSnapshot(calleeCandidates, snap => {
    snap.docChanges().forEach(change => {
      if (change.type === "added") {
        pc.addIceCandidate(change.doc.data());
      }
    });
  });

} else {
  const roomData = (await getDoc(roomRef)).data();

  await pc.setRemoteDescription(roomData.offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await updateDoc(roomRef, { answer });

  // GET CALLER ICE
  onSnapshot(callerCandidates, snap => {
    snap.docChanges().forEach(change => {
      if (change.type === "added") {
        pc.addIceCandidate(change.doc.data());
      }
    });
  });
}
</script>
