<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENT BF - Connecting</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #000; color: #32cd32; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .loader { border: 4px solid #111; border-top: 4px solid #32cd32; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .timer-box { font-size: 24px; color: #ff0000; font-weight: bold; margin-top: 10px; display: none; }
        
        /* ಪೇಮೆಂಟ್ ಮೋಡಲ್ ಸ್ಟೈಲ್ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .payment-card { background: #111; padding: 25px; border-radius: 20px; border: 2px solid #32cd32; width: 85%; text-align: center; }
        .pay-btn { background: #32cd32; color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; display: block; width: 100%; text-decoration: none; }
        
        .controls { position: fixed; bottom: 30px; display: none; gap: 20px; width: 100%; justify-content: center; z-index: 999; }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mute-btn { background: #555; color: white; }
        .hangup-btn { background: #ff0000; color: white; }
        
        #jitsi-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

    <div class="container" id="init-ui">
        <div class="loader"></div>
        <div id="status" class="msg">ಪ್ರೊಸೆಸಿಂಗ್ ಮಾಡಲಾಗುತ್ತಿದೆ...</div>
        <div id="countdown" class="timer-box">10 ಸೆಕೆಂಡ್ ಬಾಕಿ ಇದೆ</div>
    </div>

    <div id="jitsi-container"></div>

    <div class="controls" id="call-controls">
        <button class="control-btn mute-btn" id="mute-toggle" onclick="toggleAudio()"><i class="fa-solid fa-microphone"></i></button>
        <button class="control-btn hangup-btn" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <div class="modal" id="paymentModal">
        <div class="payment-card">
            <h3 style="color: #fff;">ಉಚಿತ ಸಮಯ ಮುಗಿದಿದೆ!</h3>
            <p style="color: #ccc; font-size: 13px;">ಮುಂದೆ ವೀಕ್ಷಿಸಲು ₹5 ಪಾವತಿಸಿ.</p>
            <a href="upi://pay?pa=sagarbssagarbs231@oksbi&pn=Sagar&am=5&cu=INR" class="pay-btn" onclick="paymentDone()">PAY ₹5 (UPI)</a>
            <button onclick="endCall()" style="background: none; border: none; color: #888; margin-top: 15px; cursor: pointer;">ಕಾಲ್ ಕಟ್ ಮಾಡಿ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", authDomain: "sykolive-846a3.firebaseapp.com", projectId: "sykolive-846a3" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const targetUid = params.get('targetUid');
        const targetName = params.get('targetName');
        const myName = params.get('myName');

        let api = null;
        let isMuted = false;

        async function init() {
            if (type === 'call') {
                document.getElementById('status').innerText = targetName + " ಅವರಿಗೆ ಕಾಲ್ ರೆಡಿ ಆಗುತ್ತಿದೆ...";
                startVideoCall();
            } else {
                document.getElementById('status').innerText = "ಚಾಟ್ ಬಾಕ್ಸ್ ತೆರೆಯಲಾಗುತ್ತಿದೆ...";
                setTimeout(() => { alert("ಚಾಟ್ ಉಚಿತವಾಗಿದೆ!"); window.location.href = "live-user.html"; }, 2000);
            }
        }

        async function startVideoCall() {
            const roomID = "RENTBF_" + Math.random().toString(36).substring(7);
            
            // Firebase ಗೆ ಮಾಹಿತಿ ರವಾನೆ
            await setDoc(doc(db, "calls", targetUid), {
                fromName: myName, roomID: roomID, status: "incoming", time: Date.now()
            });

            // Jitsi Meet External API ಲೋಡ್ ಮಾಡುವುದು
            const script = document.createElement('script');
            script.src = "https://meet.jit.si/external_api.js";
            script.onload = () => {
                const options = {
                    roomName: roomID,
                    width: '100%',
                    height: '100%',
                    parentNode: document.querySelector('#jitsi-container'),
                    configOverwrite: { startWithAudioMuted: false, prejoinPageEnabled: false },
                    interfaceConfigOverwrite: { TOOLBAR_BUTTONS: [] } // ಕಸ್ಟಮ್ ಕಂಟ್ರೋಲ್ಸ್ ಬಳಸಲು ಹಳೆಯ ಬಟನ್ ಹೈಡ್ ಮಾಡಿದ್ದೇವೆ
                };
                
                api = new JitsiMeetExternalAPI("meet.jit.si", options);
                
                document.getElementById('init-ui').style.display = 'none';
                document.getElementById('jitsi-container').style.display = 'block';
                document.getElementById('call-controls').style.display = 'flex';
                
                startFreeTimer();
            };
            document.head.appendChild(script);
        }

        function startFreeTimer() {
            let timeLeft = 10;
            const timerDiv = document.getElementById('countdown');
            timerDiv.style.display = 'block';

            const interval = setInterval(() => {
                timeLeft--;
                timerDiv.innerText = timeLeft + " ಸೆಕೆಂಡ್ ಬಾಕಿ ಇದೆ";
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    showPayment();
                }
            }, 1000);
        }

        function showPayment() {
            // ವಿಡಿಯೋ ಮತ್ತು ಆಡಿಯೋ ತಾತ್ಕಾಲಿಕ ಮ್ಯೂಟ್ ಮಾಡುವುದು
            api.executeCommand('toggleAudio');
            api.executeCommand('toggleVideo');
            document.getElementById('paymentModal').style.display = 'flex';
        }

        window.toggleAudio = () => {
            api.executeCommand('toggleAudio');
            isMuted = !isMuted;
            document.getElementById('mute-toggle').innerHTML = isMuted ? 
                '<i class="fa-solid fa-microphone-slash"></i>' : '<i class="fa-solid fa-microphone"></i>';
        };

        window.endCall = () => {
            if(api) api.dispose();
            window.location.href = "live-user.html";
        };

        window.paymentDone = () => {
            // ಪೇಮೆಂಟ್ ಕ್ಲಿಕ್ ಮಾಡಿದ ನಂತರ ಅನ್-ಮ್ಯೂಟ್ ಮಾಡಿ ಮುಂದುವರಿಸುವುದು
            alert("ಪೇಮೆಂಟ್ ಪ್ರೊಸೆಸಿಂಗ್... ಕಾಲ್ ಮುಂದುವರಿಯುತ್ತಿದೆ.");
            document.getElementById('paymentModal').style.display = 'none';
            api.executeCommand('toggleAudio');
            api.executeCommand('toggleVideo');
            document.getElementById('countdown').innerText = "Premium Call Active";
        };

        init();
    </script>
</body>
</html>
