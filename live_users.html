<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Users</title>
</head>

<body style="background:black;color:white">

<h2>RENT GIRLS & BOYS</h2>
<div id="count"></div>
<div id="list"></div>

<div id="popup" style="display:none;background:#111;padding:20px">
<h3 id="caller"></h3>
<button onclick="accept()">Accept</button>
<button onclick="reject()">Reject</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let uid,callData;

onAuthStateChanged(auth,user=>{
 if(!user){location.href="index.html";return;}
 uid=user.uid;

 onSnapshot(collection(db,"users"),snap=>{
  let html="",count=0;

  snap.forEach(d=>{
   let u=d.data();

   if(u.uid!==uid){
    if(u.isOnline) count++;

    html+=`
    <div>
      <img src="${u.profilePic}" width="50">
      ${u.name}
      <button onclick="callUser('${u.uid}')">📹</button>
    </div>`;
   }
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("count").innerText=count+" online";
 });

 // CALL LISTENER
 onSnapshot(doc(db,"calls",uid),snap=>{
  if(snap.exists()){
   callData=snap.data();
   document.getElementById("popup").style.display="block";
   document.getElementById("caller").innerText="Call incoming";
  }
 });

});

window.callUser=async(id)=>{
 let room="room_"+Math.floor(Math.random()*100000);
 await setDoc(doc(db,"calls",id),{from:uid,room});
 location.href=`connect.html?room=${room}&caller=true`;
};

window.accept=()=>{
 location.href=`connect.html?room=${callData.room}`;
};

window.reject=async()=>{
 await deleteDoc(doc(db,"calls",uid));
 document.getElementById("popup").style.display="none";
};
</script>

</body>
</html>
