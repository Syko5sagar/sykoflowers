<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENT BF - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: white; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 2px solid #32cd32; position: sticky; top: 0; background: #000; z-index: 100; }
        .logo-area h2 { color: #32cd32; font-weight: 800; }
        .online-status { font-size: 10px; color: #32cd32; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 8px; height: 8px; background: #32cd32; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .my-profile-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #32cd32; }
        .tabs { display: flex; justify-content: space-around; margin: 15px 0; background: #111; border-radius: 15px; padding: 5px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 12px; font-size: 13px; color: #888; }
        .tab.active { background: #32cd32; color: #000; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
        .user-card { background: #111; margin-bottom: 12px; padding: 15px; border-radius: 20px; display: flex; align-items: center; border: 1px solid #222; }
        .user-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #32cd32; margin-right: 15px; }
        .user-info { flex: 1; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .call-btn { background: #32cd32; color: #000; }
        .chat-btn { background: #007bff; color: #fff; }
        .book-btn { background: #ff0000; color: #fff; width: auto; padding: 0 12px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <h2>RENT BF</h2>
            <div class="online-status"><span class="online-dot"></span> <span id="activeCount">0</span> ಲೈವ್ ಇದ್ದಾರೆ</div>
        </div>
        <img src="https://via.placeholder.com/35" class="my-profile-img" id="myTopImg">
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('users')">ಯೂಸರ್ಸ್ ಲಿಸ್ಟ್</div>
        <div class="tab" onclick="switchTab('bookings')">ಬುಕ್ಕಿಂಗ್ಸ್ <span id="bookingBadge" style="display:none; color:red;">●</span></div>
    </div>

    <div id="usersSection" class="section active"><div id="userList"></div></div>
    <div id="bookingsSection" class="section"><div id="bookedByMeList"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", authDomain: "sykolive-846a3.firebaseapp.com", projectId: "sykolive-846a3" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let myDetails = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myDetails.uid = user.uid;
                loadUsers(user.uid);
                listenForIncomingCalls(user.uid);
            } else { window.location.href = "index.html"; }
        });

        function loadUsers(myID) {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('userList');
                document.getElementById('activeCount').innerText = snapshot.size;
                list.innerHTML = "";
                snapshot.forEach((uDoc) => {
                    const data = uDoc.data();
                    if (data.uid === myID) {
                        myDetails.name = data.name;
                        document.getElementById('myTopImg').src = data.profilePic || "";
                    } else {
                        list.innerHTML += `
                        <div class="user-card">
                            <img src="${data.profilePic}">
                            <div class="user-info"><h3>${data.name}</h3><p>₹${data.rate}/ದಿನ</p></div>
                            <div class="btn-group">
                                <button class="btn chat-btn" onclick="goToConnect('chat','${data.uid}','${data.name}')"><i class="fa-solid fa-comment"></i></button>
                                <button class="btn call-btn" onclick="goToConnect('call','${data.uid}','${data.name}')"><i class="fa-solid fa-video"></i></button>
                            </div>
                        </div>`;
                    }
                });
            });
        }

        // ಇನ್‌ಕಮಿಂಗ್ ಕಾಲ್ ಕೇಳಿಸಿಕೊಳ್ಳುವುದು
        function listenForIncomingCalls(myID) {
            onSnapshot(doc(db, "calls", myID), (snapshot) => {
                if (snapshot.exists()) {
                    const callData = snapshot.data();
                    if (callData.status === "incoming") {
                        if (confirm(callData.fromName + " ಅವರಿಂದ ಕಾಲ್ ಬರುತ್ತಿದೆ... ಅಕ್ಸೆಪ್ಟ್ ಮಾಡುವಿರಾ?")) {
                            const room = callData.roomID;
                            deleteDoc(doc(db, "calls", myID));
                            window.location.href = `https://meet.jit.si/${room}`;
                        } else {
                            deleteDoc(doc(db, "calls", myID));
                        }
                    }
                }
            });
        }

        window.goToConnect = (type, uid, name) => {
            window.location.href = `connect.html?type=${type}&targetUid=${uid}&targetName=${encodeURIComponent(name)}&myName=${encodeURIComponent(myDetails.name)}`;
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab, .section').forEach(el => el.classList.remove('active'));
            if(tab === 'users') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('usersSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('bookingsSection').classList.add('active');
            }
        };
    </script>
</body>
</html>
