<!DOCTYPE html>
<html>
<body style="background:black;color:white">

<h2>Users</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid;

auth.onAuthStateChanged(u=>{
 uid=u.uid;

 onSnapshot(collection(db,"users"),snap=>{
  let html="";
  snap.forEach(d=>{
   const x=d.data();
   if(x.uid!=uid){
    html+=`
    <div>
      <img src="${x.profilePic}" width=50>
      ${x.name} ₹${x.rate}
      <button onclick="chat('${x.uid}')">Chat</button>
      <button onclick="call('${x.uid}')">Call</button>
      <button onclick="book('${x.uid}')">Book</button>
    </div>`;
   }
  });
  document.getElementById("list").innerHTML=html;
 });
});

window.chat=(id)=>{
 location.href=`chat.html?chatID=${uid}_${id}`;
};

window.call=async(id)=>{
 const room="R"+Math.random();
 await setDoc(doc(db,"calls",id),{from:uid,room});
 location.href=`connect.html?room=${room}&mode=caller`;
};

window.book=async(id)=>{
 await setDoc(doc(db,"bookings",uid+"_"+id),{from:uid,to:id});
 alert("Booked");
};
</script>

</body>
</html>
