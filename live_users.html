<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENT BF - Live Users</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 10px; }
        .user-card { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .call-btn { background: #32cd32; color: #000; }
        .chat-btn { background: #007bff; color: #fff; }
        h2 { color: #32cd32; text-align: center; }
    </style>
</head>
<body>

    <h2>RENT BF - ಲೈವ್ ಯೂಸರ್ಸ್</h2>
    <div id="userList">ಲೋಡ್ ಆಗುತ್ತಿದೆ...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
            authDomain: "sykolive-846a3.firebaseapp.com", 
            projectId: "sykolive-846a3" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let myDetails = { uid: "", name: "" };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myDetails.uid = user.uid;
                myDetails.name = user.displayName || "User";
                loadUsers(user.uid);
                listenForCalls(user.uid);
            } else { window.location.href = "index.html"; }
        });

        // ಕಾಲ್ ಸ್ವೀಕರಿಸುವ ಭಾಗ (Y ಗಾಗಿ)
        function listenForCalls(myID) {
            onSnapshot(doc(db, "calls", myID), (snapshot) => {
                if (snapshot.exists()) {
                    const callData = snapshot.data();
                    if (callData.status === "pending") {
                        const accept = confirm(callData.fromName + " ಅವರಿಂದ ಕಾಲ್ ಬರುತ್ತಿದೆ. ಅಕ್ಸೆಪ್ಟ್ ಮಾಡುವಿರಾ?");
                        if (accept) {
                            // ನೇರವಾಗಿ ಕಾಲ್ ರೂಮ್‌ಗೆ ಹೋಗುವುದು
                            window.location.href = `connect.html?type=call&mode=receiver&roomID=${callData.roomID}&targetUid=${myID}&targetName=${encodeURIComponent(callData.fromName)}`;
                        } else {
                            deleteDoc(doc(db, "calls", myID));
                        }
                    }
                }
            });
        }

        function loadUsers(myID) {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById('userList');
                list.innerHTML = "";
                snapshot.forEach((uDoc) => {
                    const data = uDoc.data();
                    if (data.uid !== myID) {
                        const div = document.createElement('div');
                        div.className = 'user-card';
                        div.innerHTML = `
                            <span>${data.name}</span>
                            <div>
                                <button class="btn chat-btn" onclick="startChat('${data.uid}','${data.name}')">Chat</button>
                                <button class="btn call-btn" onclick="makeCall('${data.uid}','${data.name}')">Video Call</button>
                            </div>`;
                        list.appendChild(div);
                    }
                });
            });
        }

        // ಕಾಲ್ ಮಾಡುವ ಭಾಗ (X ಗಾಗಿ)
        window.makeCall = (targetUid, targetName) => {
            const roomID = "ROOM_" + Math.random().toString(36).substring(7);
            window.location.href = `connect.html?type=call&mode=caller&targetUid=${targetUid}&targetName=${encodeURIComponent(targetName)}&roomID=${roomID}&myName=${encodeURIComponent(myDetails.name)}`;
        };

        window.startChat = (targetUid, targetName) => {
            const roomID = "CHAT_" + (myDetails.uid < targetUid ? myDetails.uid + targetUid : targetUid + myDetails.uid);
            window.location.href = `connect.html?type=chat&mode=caller&targetUid=${targetUid}&targetName=${encodeURIComponent(targetName)}&roomID=${roomID}`;
        };
    </script>
</body>
</html>
