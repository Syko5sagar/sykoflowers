<script type="module">
    // ... ಫೈರ್‌ಬೇಸ್ ಇನಿಶಿಯಲೈಸೇಶನ್ ಇಲ್ಲೂ ಇರಲಿ ...

    function loadUsers() {
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snapshot.forEach((u) => {
                const data = u.data();
                if (data.uid !== currentUser.uid) {
                    list.innerHTML += `
                    <div class="user-card">
                        <img src="${data.profilePic || 'https://via.placeholder.com/60'}">
                        <div class="user-info">
                            <h3>${data.name}</h3>
                            <p class="status">${data.isOnline ? '● ಆನ್‌ಲೈನ್' : 'ಆಫ್‌ಲೈನ್'}</p>
                        </div>
                        <div class="actions">
                            <button class="btn chat-btn" onclick="goToChat('${data.uid}', '${data.name}')" style="background:#007bff; color:white;">
                                <i class="fa-solid fa-message"></i>
                            </button>
                            <button class="btn call-btn" onclick="startOwnCall('${data.uid}')">
                                <i class="fa-solid fa-video"></i>
                            </button>
                        </div>
                    </div>`;
                }
            });
        });
    }

    window.goToChat = (uid, name) => {
        // ಇಬ್ಬರ ನಡುವೆ ಒಂದು ಯುನಿಕ್ ಚಾಟ್ ರೂಮ್ ಐಡಿ ಕ್ರಿಯೇಟ್ ಮಾಡುವುದು
        const chatID = currentUser.uid < uid ? currentUser.uid + "_" + uid : uid + "_" + currentUser.uid;
        window.location.href = `chat.html?chatID=${chatID}&targetName=${encodeURIComponent(name)}&targetUid=${uid}`;
    };
</script>
