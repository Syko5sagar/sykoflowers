<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENT BF - Live Users</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ನಿಮ್ಮ ಹಳೆಯ ಸಿಸ್ಟಮ್ ಡಿಸೈನ್ ಇಲ್ಲಿದೆ */
        body { background: #000; color: white; font-family: sans-serif; }
        .user-card { background: #111; margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .user-info img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #32cd32; margin-right: 10px; }
        .status { font-size: 12px; color: #32cd32; }
        .btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; margin-left: 5px; color: white; }
        .chat-btn { background: #007bff; }
        .call-btn { background: #32cd32; color: black; }
        
        /* ಇನ್‌ಕಮಿಂಗ್ ಕಾಲ್ ಪಾಪ್-ಅಪ್ ಡಿಸೈನ್ */
        .call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .call-box { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #32cd32; text-align: center; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#32cd32;">ಲೈವ್ ಯೂಸರ್ಸ್</h2>
    <div id="userList">ಲೋಡ್ ಆಗುತ್ತಿದೆ...</div>

    <div class="call-overlay" id="incomingCallOverlay">
        <div class="call-box">
            <h3 id="callerName">ಯಾರೋ...</h3>
            <p>ವಿಡಿಯೋ ಕಾಲ್ ಮಾಡುತ್ತಿದ್ದಾರೆ</p>
            <button class="btn" id="acceptCallBtn" style="background:#32cd32; color:black; padding:10px 20px;">ಅಕ್ಸೆಪ್ಟ್</button>
            <button class="btn" id="rejectCallBtn" style="background:red; padding:10px 20px;">ರಿಜೆಕ್ಟ್</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
        authDomain: "sykolive-846a3.firebaseapp.com", 
        projectId: "sykolive-846a3" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let myData = { name: "User" };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            // ಆನ್‌ಲೈನ್ ಸ್ಟೇಟಸ್ ಅಪ್‌ಡೇಟ್
            updateDoc(doc(db, "users", user.uid), { isOnline: true, lastSeen: serverTimestamp() });
            loadUsers();
            listenForIncomingCalls();
        } else {
            window.location.href = "index.html";
        }
    });

    // 1. ಆನ್‌ಲೈನ್ ಸ್ಟೇಟಸ್ ಇಂಡಿಕೇಟರ್ ಲಾಜಿಕ್
    function loadUsers() {
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snapshot.forEach((u) => {
                const data = u.data();
                if (data.uid === currentUser.uid) {
                    myData.name = data.name;
                } else {
                    list.innerHTML += `
                    <div class="user-card">
                        <div class="user-info" style="display:flex; align-items:center;">
                            <img src="${data.profilePic || 'https://via.placeholder.com/50'}">
                            <div>
                                <strong>${data.name}</strong><br>
                                <span class="status">${data.isOnline ? '● ಆನ್‌ಲೈನ್' : 'ಆಫ್‌ಲೈನ್'}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn chat-btn" onclick="goToChat('${data.uid}', '${data.name}')"><i class="fa-solid fa-message"></i></button>
                            <button class="btn call-btn" onclick="makeCall('${data.uid}', '${data.name}')"><i class="fa-solid fa-video"></i></button>
                        </div>
                    </div>`;
                }
            });
        });
    }

    // 2. ಚಾಟ್ ಕನೆಕ್ಷನ್ ಲಾಜಿಕ್
    window.goToChat = (targetUid, targetName) => {
        const chatID = currentUser.uid < targetUid ? currentUser.uid + "_" + targetUid : targetUid + "_" + currentUser.uid;
        window.location.href = `chat.html?chatID=${chatID}&targetName=${encodeURIComponent(targetName)}&targetUid=${targetUid}`;
    };

    // 3. ವಿಡಿಯೋ ಕಾಲ್ ಕನೆಕ್ಷನ್ ಲಾಜಿಕ್ (X ಇಂದ Y ಗೆ)
    window.makeCall = async (targetUid, targetName) => {
        const roomID = "LIVE_" + Math.random().toString(36).substring(7);
        await setDoc(doc(db, "calls", targetUid), {
            fromID: currentUser.uid,
            fromName: myData.name,
            roomID: roomID,
            status: 'pending',
            timestamp: serverTimestamp()
        });
        window.location.href = `connect.html?mode=caller&roomID=${roomID}&targetUid=${targetUid}&targetName=${encodeURIComponent(targetName)}&myName=${encodeURIComponent(myData.name)}`;
    };

    // 4. ಇನ್‌ಕಮಿಂಗ್ ಕಾಲ್ ಸಿಗ್ನಲಿಂಗ್ ಲಾಜಿಕ್ (Y ಗಾಗಿ)
    function listenForIncomingCalls() {
        onSnapshot(doc(db, "calls", currentUser.uid), (docSnap) => {
            if (docSnap.exists() && docSnap.data().status === 'pending') {
                const data = docSnap.data();
                document.getElementById('callerName').innerText = data.fromName;
                document.getElementById('incomingCallOverlay').style.display = 'flex';
                
                document.getElementById('acceptCallBtn').onclick = () => {
                    window.location.href = `connect.html?mode=receiver&roomID=${data.roomID}&targetUid=${currentUser.uid}&targetName=${encodeURIComponent(data.fromName)}`;
                };
                document.getElementById('rejectCallBtn').onclick = async () => {
                    await deleteDoc(doc(db, "calls", currentUser.uid));
                    document.getElementById('incomingCallOverlay').style.display = 'none';
                };
            }
        });
    }
</script>
</body>
</html>
