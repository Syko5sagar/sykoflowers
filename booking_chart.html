<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let unsubscribe;

onAuthStateChanged(auth,user=>{
 if(!user){
  location.href="index.html";
  return;
 }

 const q = query(
  collection(db,"bookings"),
  where("bookerId","==",user.uid),
  orderBy("time","desc")
 );

 if(unsubscribe) unsubscribe();

 unsubscribe = onSnapshot(q,(snap)=>{
  let html="";

  if(snap.empty){
   html="<div class='no-data'>ಯಾವುದೇ ಬುಕಿಂಗ್ ಇಲ್ಲ</div>";
  }

  snap.forEach(doc=>{
   const b=doc.data();

   html+=`
   <div class="booking-item">
    <div class="info-row">
     <span class="label">Booker</span>
     <span class="status-badge">${b.status || "Done"}</span>
    </div>

    <div class="info-row">
     <span class="name">${b.bookerName || "User"}</span>
     <span class="price">₹${b.amount || 0}</span>
    </div>

    <div style="margin-top:10px;border-top:1px solid #232d36;padding-top:10px;">
     <span class="label">Target:</span>
     <span class="target">${b.targetName || "Unknown"}</span>
    </div>

    <span class="time">📅 ${b.time || "-"}</span>
   </div>
   `;
  });

  chartList.innerHTML=html;
 });

});
</script>
