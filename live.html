<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Users</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{background:#000;color:white;font-family:sans-serif;margin:0}

/* HEADER */
.header{
 padding:15px;
 border-bottom:1px solid #222;
}

.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.title{
 font-size:20px;
 font-weight:bold;
 color:#32cd32;
}

.sub{
 font-size:12px;
 color:#aaa;
}

/* PROFILE TOP RIGHT */
.myProfile{
 display:flex;
 align-items:center;
 gap:10px;
}

.myProfile img{
 width:40px;
 height:40px;
 border-radius:50%;
 border:2px solid #32cd32;
}

/* LIST */
#list{padding:10px}

/* CARD */
.card{
 background:#111;
 border-radius:15px;
 padding:12px;
 margin-bottom:10px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 border:1px solid #222;
}

/* PROFILE */
.profile{
 display:flex;
 align-items:center;
 gap:10px;
}

.profile img{
 width:55px;
 height:55px;
 border-radius:50%;
 border:2px solid #32cd32;
 object-fit:cover;
}

/* BUTTONS */
.actions button{
 margin-left:5px;
 padding:8px;
 border:none;
 border-radius:10px;
 cursor:pointer;
}

.call{background:#32cd32;color:black}
.chat{background:#007bff;color:white}
.book{background:orange;color:black}

/* POPUP */
#popup{
 display:none;
 position:fixed;
 top:40%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 padding:20px;
 border-radius:15px;
 border:2px solid #32cd32;
 text-align:center;
}
</style>
</head>

<body>

<div class="header">
 <div class="topbar">
  
  <div>
   <div class="title">RENT GIRLS & BOYS</div>
   <div id="count" class="sub"></div>
  </div>

  <div class="myProfile">
   <span id="myName"></span>
   <img id="myPic">
   <button onclick="location.href='booking.html'" style="background:orange;border:none;padding:6px;border-radius:8px">₹</button>
  </div>

 </div>
</div>

<div id="list"></div>

<!-- CALL POPUP -->
<div id="popup">
 <h3 id="caller"></h3>
 <button onclick="accept()" class="call">Accept</button>
 <button onclick="reject()" style="background:red;color:white">Reject</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let uid,callData;

onAuthStateChanged(auth, async user=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid=user.uid;

 // 🔥 MY PROFILE
 const myDoc = await getDoc(doc(db,"users",uid));
 if(myDoc.exists()){
  const me = myDoc.data();
  document.getElementById("myName").innerText = me.name;
  document.getElementById("myPic").src = me.profilePic;
 }

 // 🔥 USERS LIST
 onSnapshot(collection(db,"users"),snap=>{
  let html="",count=0;

  snap.forEach(d=>{
   let u=d.data();

   if(u.uid!==uid){

    if(u.isOnline) count++;

    html+=`
    <div class="card">
     
     <div class="profile">
      <img src="${u.profilePic}">
      <div>
       <strong>${u.name}</strong><br>
       ${u.age} yrs • ₹${u.rate}
      </div>
     </div>

     <div class="actions">
      <button class="chat" onclick="chat('${u.uid}','${u.name}')">💬</button>
      <button class="call" onclick="callUser('${u.uid}')">📹</button>
      <button class="book" onclick="book('${u.uid}','${u.name}','${u.rate}')">₹</button>
     </div>

    </div>`;
   }
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("count").innerText=count+" online";
 });

 // 🔥 CALL LISTENER
 onSnapshot(doc(db,"calls",uid),snap=>{
  if(snap.exists()){
   callData=snap.data();
   document.getElementById("popup").style.display="block";
   document.getElementById("caller").innerText="Call from "+callData.from;
  }
 });

});

// 🔥 CALL
window.callUser=async(id)=>{
 let room="room_"+Math.floor(Math.random()*1000000);
 await setDoc(doc(db,"calls",id),{from:uid,room});
 location.href=`connect.html?room=${room}&caller=true`;
};

// 🔥 CHAT
window.chat=(id,name)=>{
 location.href=`chat.html?id=${id}&name=${name}`;
};

// 🔥 BOOKING
window.book=async(targetId,name,rate)=>{
 const ok = confirm(`${name} ಅನ್ನು ₹${rate} ಗೆ ಬುಕ್ ಮಾಡಬೇಕಾ?`);
 if(!ok) return;

 await addDoc(collection(db,"bookings"),{
  from:uid,
  to:targetId,
  name:name,
  rate:rate,
  status:"pending",
  time:Date.now()
 });

 alert("Booking success ✅");
};

// 🔥 ACCEPT CALL
window.accept=()=>{
 location.href=`connect.html?room=${callData.room}`;
};

// 🔥 REJECT CALL
window.reject=async()=>{
 await deleteDoc(doc(db,"calls",uid));
 document.getElementById("popup").style.display="none";
};
</script>

</body>
</html>
