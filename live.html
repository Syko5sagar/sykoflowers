<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body{background:#000;color:#fff;font-family:Poppins;margin:0}

.header{
background:linear-gradient(45deg,#ff0066,#ff6600);
padding:15px;
text-align:center;
font-weight:bold;
}

.top{
display:flex;
align-items:center;
padding:10px;
background:#111;
}

.top img{
width:45px;
height:45px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
border:2px solid #fff;
}

.user{
background:#111;
margin:10px;
padding:10px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.user-left{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

.btn{
padding:5px 8px;
margin:3px;
border:none;
border-radius:5px;
color:#fff;
cursor:pointer;
}

.chat{background:green}
.call{background:blue}
.book{background:#ff0066;margin-top:5px;width:100%}
</style>
</head>

<body>

<div class="header">🔥 LIVE USERS 🔥</div>

<div class="top">
<img id="myDp">
<div id="myName">Loading...</div>
</div>

<div id="count"></div>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid;

// ================= LOGIN =================
onAuthStateChanged(auth, async(user)=>{
if(!user){
location.href="index.html";
return;
}

uid = user.uid;

// 🔥 ONLINE STATUS
await setDoc(doc(db,"users",uid),{
isOnline:true,
lastSeen:Date.now()
},{merge:true});

// heartbeat
setInterval(()=>{
updateDoc(doc(db,"users",uid),{
lastSeen:Date.now(),
isOnline:true
}).catch(()=>{});
},30000);

// PROFILE
onSnapshot(doc(db,"users",uid),(s)=>{
let u = s.data();
if(!u) return;

document.getElementById("myName").innerText = u.name || "User";
document.getElementById("myDp").src =
u.profilePic || "https://via.placeholder.com/50";
});

// USERS LIST
onSnapshot(collection(db,"users"),(snap)=>{

let html="";
let count=0;

snap.forEach(d=>{
let u = d.data();

let online = u.lastSeen && (Date.now()-u.lastSeen < 120000);

if(d.id !== uid && online){
count++;

html += `
<div class="user">

<div class="user-left">
<img src="${u.profilePic || 'https://via.placeholder.com/40'}">
<div>
<b>${u.name || "User"}</b><br>
₹${u.rate || 0}
</div>
</div>

<div>
<button class="btn chat" onclick="chatUser('${d.id}')">Chat</button>
<button class="btn call" onclick="callUser('${d.id}')">Call</button>
<button class="btn book" onclick="bookUser('${d.id}','${u.name}','${u.rate}')">Book</button>
</div>

</div>`;
}
});

document.getElementById("list").innerHTML = html;
document.getElementById("count").innerText = count + " users online";
});

});

// CHAT
window.chatUser = (id)=>{
location.href="chat.html?id="+id;
};

// ================= 🔥 FIXED CALL =================
window.callUser = async (id)=>{

let room = [uid,id].sort().join("_");

// create call room
await setDoc(doc(db,"calls",room),{
caller:uid,
receiver:id,
status:"calling",
createdAt:Date.now()
},{merge:true});

// 👉 SAFE REDIRECT (FIXED)
location.href =
"connect.html?room=" + encodeURIComponent(room) +
"&id=" + encodeURIComponent(uid) +
"&role=caller" +
"&to=" + encodeURIComponent(id);
};

// BOOKING
window.bookUser = async(id,name,rate)=>{

await setDoc(doc(db,"bookings","b_"+Date.now()),{
bookerId:uid,
targetId:id,
targetName:name,
amount:rate,
status:"pending",
time:Date.now()
});

alert("Booking Sent 🔥");
};

</script>

</body>
</html>
