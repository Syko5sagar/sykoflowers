<!DOCTYPE html>
<html>
<head>
  <title>Live Users</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
    }

    .header {
      background: linear-gradient(45deg,#ff0066,#ff6600);
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .top-profile {
      display: flex;
      align-items: center;
      padding: 10px;
      background: #1a1a1a;
    }

    .top-profile img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      margin-right: 10px;
    }

    #count {
      text-align: center;
      padding: 10px;
      background: #222;
    }

    .user {
      background: #1c1c1c;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .top {
      display: flex;
      justify-content: space-between;
    }

    .left {
      display: flex;
      align-items: center;
    }

    .left img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }

    button {
      border: none;
      padding: 6px 8px;
      border-radius: 5px;
      margin-left: 5px;
      cursor: pointer;
    }

    .chat { background: green; color: white; }
    .call { background: blue; color: white; }

    .book {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #ff0066;
      color: white;
      font-weight: bold;
    }

    #popup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #222;
      padding: 15px;
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">🔥 RENT GF/BF 🔥</div>

<div class="top-profile">
  <img id="myDp">
  <div id="myName">Loading...</div>
</div>

<div id="count"></div>
<div id="list"></div>

<div id="popup">
  <p id="caller"></p>
  <button onclick="accept()">Accept</button>
  <button onclick="reject()">Reject</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid, callData;

onAuthStateChanged(auth, async (user) => {
 if(!user){ location.href="index.html"; return; }

 uid = user.uid;

 // 🔥 TOP PROFILE
 document.getElementById("myName").innerText = user.displayName || "User";
 document.getElementById("myDp").src = user.photoURL || "https://via.placeholder.com/50";

 // 🔥 SAVE USER (FIXED)
 await setDoc(doc(db, "users", uid), {
  name: user.displayName || "User",
  profilePic: user.photoURL || "",
  age: 20,
  rate: 50,
  isOnline: true,
  lastSeen: serverTimestamp()
 }, { merge: true });

 // 🔥 USER LIST (MAIN FIX)
 onSnapshot(collection(db, "users"), (snap) => {
  let html = "", count = 0;

  snap.forEach((d) => {
   let u = d.data();

   if(d.id !== uid && u.isOnline === true && u.name) {
    count++;

    html += `
    <div class="user">
      <div class="top">
        <div class="left">
          <img src="${u.profilePic || 'https://via.placeholder.com/50'}">
          <div>
            <div>${u.name}</div>
            <div>₹${u.rate}/min</div>
          </div>
        </div>

        <div>
          <button class="chat" onclick="chatUser('${d.id}','${u.name}')">💬</button>
          <button class="call" onclick="callUser('${d.id}')">📞</button>
        </div>
      </div>

      <button class="book" onclick="bookUser('${u.name}','${u.rate}','${d.id}')">
        💖 BOOK NOW
      </button>
    </div>`;
   }
  });

  document.getElementById("list").innerHTML = html || "No users online";
  document.getElementById("count").innerText = count + " ONLINE";
 });

 // 🔥 CALL LISTENER
 onSnapshot(doc(db, "calls", uid), (snap) => {
  if(snap.exists()){
   callData = snap.data();
   document.getElementById("popup").style.display = "block";
   document.getElementById("caller").innerText = "Incoming Call...";
  }
 });
});

// BOOKING
window.bookUser = async (name, rate, id) => {
 let bid = "book_" + Date.now();
 await setDoc(doc(db, "bookings", bid), {
  user: uid,
  target: id,
  name,
  amount: rate
 });
 alert("Booked " + name);
};

// CALL
window.callUser = async(id) => {
 let room = "room_" + Date.now();
 await setDoc(doc(db, "calls", id), { from: uid, room });
 location.href = `connect.html?room=${room}&caller=true`;
};

// CHAT
window.chatUser = (id, name) => {
 location.href = `chat.html?id=${id}&name=${name}`;
};

// ACCEPT / REJECT
window.accept = () => {
 location.href = `connect.html?room=${callData.room}`;
};

window.reject = async() => {
 await deleteDoc(doc(db, "calls", uid));
 document.getElementById("popup").style.display = "none";
};
</script>

</body>
</html>
