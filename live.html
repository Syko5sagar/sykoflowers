<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body{background:#000;color:#fff;font-family:Poppins;margin:0}

.header{
 background:linear-gradient(45deg,#ff0066,#ff6600);
 padding:15px;
 text-align:center;
 font-weight:bold;
}

.top{
 display:flex;
 align-items:center;
 padding:10px;
 background:#111;
}

.top img{
 width:45px;height:45px;border-radius:50%;margin-right:10px;
}

.user{
 background:#111;margin:10px;padding:10px;border-radius:10px;
}

.btn{
 padding:5px 8px;margin:3px;border:none;border-radius:5px;color:#fff;
}
.chat{background:green}
.call{background:blue}
.book{background:#ff0066;width:100%;margin-top:5px}
</style>
</head>

<body>

<div class="header">🔥 LIVE USERS 🔥</div>

<div class="top">
<img id="myDp">
<div id="myName"></div>
</div>

<div id="count"></div>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid;

// 🔐 LOGIN
onAuthStateChanged(auth, async (user)=>{
 if(!user){ location.href="index.html"; return; }

 uid = user.uid;

 // 🟢 ONLINE MARK
 await updateDoc(doc(db,"users",uid),{
  isOnline:true,
  lastSeen:Date.now()
 });

 // 👤 PROFILE
 onSnapshot(doc(db,"users",uid),(s)=>{
  let u=s.data();
  if(!u) return;
  document.getElementById("myName").innerText = u.name || "User";
  document.getElementById("myDp").src = u.profilePic || "https://via.placeholder.com/50";
 });

 // 👥 USERS LIST
 onSnapshot(collection(db,"users"),(snap)=>{
  let html="",c=0;

  snap.forEach(d=>{
   let u=d.data();

   // 🔥 2 MINUTES PRESENCE LOGIC
   let isActive = u.lastSeen && (Date.now() - u.lastSeen < 2 * 60 * 1000);

   if(d.id !== uid && isActive){
    c++;

    html+=`
    <div class="user">
      <img src="${u.profilePic || 'https://via.placeholder.com/40'}" width="40">
      ${u.name} - ₹${u.rate}
      <br>

      <button class="btn chat" onclick="chatUser('${d.id}','${u.name}')">Chat</button>
      <button class="btn call" onclick="callUser('${d.id}')">Call</button>
      <button class="btn book" onclick="bookUser('${u.name}','${u.rate}','${d.id}')">Book</button>
    </div>`;
   }
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("count").innerText = c + " users online";
 });

});


// 💬 CHAT CONNECTIVITY
window.chatUser = (id, name)=>{
 location.href = `chat.html?id=${id}&name=${name}`;
};


// 📞 VIDEO CALL CONNECTIVITY
window.callUser = async(id)=>{
 let room = [uid, id].sort().join("_");

 await setDoc(doc(db,"calls",room),{
  caller:uid,
  receiver:id,
  status:"calling",
  time:Date.now()
 });

 location.href = `connect.html?room=${room}&caller=true`;
};


// 💰 BOOKING SYSTEM
window.bookUser = async(name,rate,id)=>{
 const user = auth.currentUser;

 await setDoc(doc(db,"bookings","b_"+Date.now()),{
  bookerId:user.uid,
  bookerName:user.displayName || "User",
  targetId:id,
  targetName:name,
  amount:rate,
  status:"pending",
  time:new Date().toLocaleString()
 });

 alert("Booking Sent 🔥");
};


// 🔥 PRESENCE SYSTEM (2 MIN GRACE)
function updateLastSeen(){
 updateDoc(doc(db,"users",uid),{
  lastSeen:Date.now()
 }).catch(()=>{});
}

// tab hide / exit
document.addEventListener("visibilitychange", ()=>{
 if(document.visibilityState === "hidden"){
  updateLastSeen();
 }
});

// mobile / page close
window.addEventListener("pagehide", updateLastSeen);

</script>

</body>
</html>
