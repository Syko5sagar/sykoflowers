<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Users</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
 background:#000;
 color:white;
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 width:100%;
 background:#000;
 padding:15px;
 border-bottom:1px solid #222;
 text-align:center;
 font-size:20px;
 color:#32cd32;
 font-weight:bold;
 z-index:100;
}

.sub{
 font-size:12px;
 color:#aaa;
 margin-top:4px;
}

/* LIST */
#list{
 padding:10px;
 max-width:600px;
 margin:auto;
}

/* USER CARD */
.user{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 border-bottom:1px solid #111;
}

/* LEFT */
.left{
 display:flex;
 align-items:center;
 gap:10px;
}

/* PROFILE PIC */
.user img{
 width:50px;
 height:50px;
 border-radius:50%;
 object-fit:cover;
 border:2px solid #32cd32;
}

/* NAME */
.name{
 font-size:15px;
 font-weight:600;
}

/* BUTTONS */
.actions button{
 border:none;
 margin-left:5px;
 padding:10px;
 border-radius:50%;
 cursor:pointer;
}

.chat{background:#007bff;color:white}
.call{background:#32cd32;color:black}
.book{background:orange;color:black}

/* POPUP */
.popup{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 padding:20px;
 border-radius:10px;
 display:none;
 text-align:center;
 z-index:999;
}

.popup button{
 margin:10px;
 padding:10px;
}

/* MOBILE FIT */
@media(max-width:500px){
 .header{font-size:18px}
 .user img{width:45px;height:45px}
 .actions button{padding:8px}
}
</style>
</head>

<body>

<div class="header">
 RENT GIRLS & BOYS
 <div id="count" class="sub">0 online</div>
</div>

<div id="list"></div>

<div id="popup" class="popup">
 <h3 id="callerName"></h3>
 <button onclick="accept()">Accept</button>
 <button onclick="reject()">Reject</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app=initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db=getFirestore(app);
const auth=getAuth(app);

let uid,callData;

// LOGIN
onAuthStateChanged(auth,user=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid=user.uid;

 // USERS LIST + ONLINE COUNT FIX
 onSnapshot(collection(db,"users"),snap=>{
  let html="";
  let onlineCount=0;

  snap.forEach(d=>{
   let u=d.data();

   if(u.uid!==uid){
    if(u.isOnline===true) onlineCount++;

    html+=`
    <div class="user">
      <div class="left">
        <img src="${u.profilePic || 'https://via.placeholder.com/50'}">
        <div>
          <div class="name">${u.name}</div>
          <div style="font-size:12px;color:#888">${u.age} yrs</div>
        </div>
      </div>

      <div class="actions">
        <button class="chat" onclick="chat('${u.uid}')">💬</button>
        <button class="call" onclick="callUser('${u.uid}')">📹</button>
        <button class="book" onclick="bookUser('${u.uid}','${u.rate}')">₹</button>
      </div>
    </div>`;
   }
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("count").innerText=onlineCount+" online";
 });

 // CALL LISTENER
 onSnapshot(doc(db,"incomingCalls",uid),snap=>{
  if(snap.exists()){
   callData=snap.data();
   popup.style.display="block";
   callerName.innerText="Incoming Call";
  }
 });

});

// CHAT
window.chat=id=>{
 location.href=`chat.html?id=${id}`;
};

// CALL
window.callUser=async(id)=>{
 let room="room_"+Math.floor(Math.random()*1000000);

 await setDoc(doc(db,"incomingCalls",id),{
  room:room,
  from:uid
 });

 location.href=`connect.html?room=${room}&caller=true`;
};

// BOOK
window.bookUser=(id,rate)=>{
 alert("Booking ₹"+rate);
};

// ACCEPT
window.accept=()=>{
 location.href=`connect.html?room=${callData.room}`;
};

// REJECT
window.reject=async()=>{
 await deleteDoc(doc(db,"incomingCalls",uid));
 popup.style.display="none";
};
</script>

</body>
</html>
