<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body{background:#000;color:#fff;font-family:Poppins;margin:0}

.header{
background:linear-gradient(45deg,#ff0066,#ff6600);
padding:15px;
text-align:center;
font-weight:bold;
}

.top{
display:flex;
align-items:center;
padding:10px;
background:#111;
}

.top img{
width:45px;height:45px;border-radius:50%;margin-right:10px;
}

.user{
background:#111;margin:10px;padding:10px;border-radius:10px;
}

.btn{
padding:5px 8px;margin:3px;border:none;border-radius:5px;color:#fff;
}
.chat{background:green}
.call{background:blue}
.book{background:#ff0066;width:100%;margin-top:5px}
</style>
</head>

<body>

<div class="header">🔥 LIVE USERS 🔥</div>

<div class="top">
<img id="myDp">
<div id="myName"></div>
</div>

<div id="count"></div>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid;

onAuthStateChanged(auth, async(user)=>{
if(!user){ location.href="index.html"; return; }

uid=user.uid;

await updateDoc(doc(db,"users",uid),{
isOnline:true,
lastSeen:Date.now()
}).catch(()=>{});

setInterval(()=>{
updateDoc(doc(db,"users",uid),{
lastSeen:Date.now(),
isOnline:true
}).catch(()=>{});
},30000);

onSnapshot(doc(db,"users",uid),(s)=>{
let u=s.data();
if(!u) return;
document.getElementById("myName").innerText = u.name || "User";
document.getElementById("myDp").src = u.profilePic || "https://via.placeholder.com/50";
});

onSnapshot(collection(db,"users"),(snap)=>{
let html="",c=0;

snap.forEach(d=>{
let u=d.data();

let online = u.lastSeen && (Date.now()-u.lastSeen < 120000);

if(d.id !== uid && online){
c++;

html+=`
<div class="user">
<img src="${u.profilePic || 'https://via.placeholder.com/40'}" width="40">
${u.name} - ₹${u.rate}
<br>

<button class="btn chat" onclick="chatUser('${d.id}','${u.name}')">Chat</button>
<button class="btn call" onclick="callUser('${d.id}')">Call</button>
<button class="btn book" onclick="bookUser('${u.name}','${u.rate}','${d.id}')">Book</button>
</div>`;
}
});

document.getElementById("list").innerHTML=html;
document.getElementById("count").innerText=c+" users online";
});

});

window.chatUser = (id,name)=>{
location.href="chat.html?id="+id+"&name="+encodeURIComponent(name);
};

// 🔥 ONLY FIXED LINE (404 ISSUE SOLVED)
window.callUser = async(id)=>{

let room=[uid,id].sort().join("_");

await setDoc(doc(db,"calls",room),{
caller:uid,
receiver:id,
status:"calling",
time:Date.now()
});

location.href="connect.html?room="+room+"&caller=true"; // ✅ FIXED
};

window.bookUser = async(name,rate,id)=>{

await setDoc(doc(db,"bookings","b_"+Date.now()),{
bookerId:uid,
targetId:id,
targetName:name,
amount:rate,
status:"pending",
time:Date.now()
});

alert("Booking Sent 🔥");
};

</script>

</body>
</html>
