<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body{background:#000;color:#fff;font-family:Poppins;margin:0}
.header{background:linear-gradient(45deg,#ff0066,#ff6600);padding:15px;text-align:center;font-weight:bold}
.top{display:flex;align-items:center;padding:10px;background:#111}
.top img{width:45px;height:45px;border-radius:50%;margin-right:10px}
.user{background:#111;margin:10px;padding:10px;border-radius:10px}
.btn{padding:5px 8px;margin:3px;border:none;border-radius:5px;color:#fff;cursor:pointer}
.chat{background:green}
.call{background:blue}
.book{background:#ff0066;width:100%;margin-top:5px}
</style>
</head>

<body>

<div class="header">🔥 LIVE USERS 🔥</div>

<div class="top">
<img id="myDp">
<div id="myName"></div>
</div>

<div id="count"></div>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
setDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid;

// ================= LOGIN =================
onAuthStateChanged(auth, async(user)=>{
if(!user){ location.href="index.html"; return; }

uid = user.uid;

// online
await setDoc(doc(db,"users",uid),{
isOnline:true,
lastSeen:Date.now()
},{merge:true});

setInterval(()=>{
updateDoc(doc(db,"users",uid),{
lastSeen:Date.now(),
isOnline:true
});
},30000);

// users list
onSnapshot(collection(db,"users"),(snap)=>{
let html="";
let c=0;

snap.forEach(d=>{
let u=d.data();
let online = u.lastSeen && (Date.now()-u.lastSeen < 120000);

if(d.id !== uid && online){
c++;

html += `
<div class="user">
${u.name || "User"}
<br>
<button class="btn chat" onclick="chatUser('${d.id}')">Chat</button>
<button class="btn call" onclick="callUser('${d.id}')">Call</button>
<button class="btn book">Book</button>
</div>`;
}
});

document.getElementById("list").innerHTML = html;
document.getElementById("count").innerText = c + " users online";
});
});

// ================= CHAT =================
window.chatUser = (id)=>{
location.href="chat.html?id="+id;
};

// ================= CALL FIX =================
window.callUser = async(id)=>{

let room = [uid,id].sort().join("_");

await setDoc(doc(db,"calls",room),{
caller:uid,
receiver:id,
status:"calling",
createdAt:Date.now()
},{merge:true});

location.href =
"connect.html?room="+room+
"&id="+uid+
"&role=caller"+
"&to="+id;
};

</script>

</body>
</html>
