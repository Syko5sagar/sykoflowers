<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let uid,callData;

onAuthStateChanged(auth, async user=>{
 if(!user){location.href="index.html";return;}
 uid=user.uid;

 // ನಿಮ್ಮನ್ನು ನೀವು ಆನ್‌ಲೈನ್ ಎಂದು ತೋರಿಸಿಕೊಳ್ಳಲು (Id ಶೋ ಆಗಲು ಇದು ಮುಖ್ಯ)
 await updateDoc(doc(db, "users", uid), { isOnline: true });

 // USERS LISTENER (ಎಲ್ಲರಿಗೂ ಎಲ್ಲರ ಐಡಿ ಕಾಣುವಂತೆ ಮಾಡಲು)
 onSnapshot(collection(db,"users"), snap=>{
  let html="", count=0;
  snap.forEach(d=>{
   let u=d.data();
   
   // u.uid !== uid ಅಂದರೆ ನಮಗೆ ನಮ್ಮ ಐಡಿ ಕಾಣಿಸುವುದಿಲ್ಲ, ಉಳಿದವರದ್ದು ಕಾಣಿಸುತ್ತದೆ. 
   // ಒಂದು ವೇಳೆ ಎಲ್ಲರಿಗೂ ಕಾಣಿಸಬೇಕೆಂದರೆ ಈ ಕಂಡಿಶನ್ ಪರೀಕ್ಷಿಸಿ.
   if(u.uid !== uid && u.isOnline){
    count++;
    html+=`
    <div class="user">
      <div class="top-section">
        <div class="left">
          <img src="${u.profilePic || 'https://via.placeholder.com/50'}">
          <div>
            <div class="name">${u.name}</div>
            <div class="age">${u.age} yrs • ₹${u.rate}</div>
          </div>
        </div>
        <div class="actions">
          <button class="chat" onclick="chatUser('${u.uid}','${u.name}')"><i class="fa-solid fa-message"></i></button>
          <button class="call" onclick="callUser('${u.uid}')"><i class="fa-solid fa-video"></i></button>
        </div>
      </div>
      <button class="big-book-btn" onclick="bookUser('${u.name}','${u.rate}','${u.uid}')">
        <i class="fa-solid fa-calendar-check"></i> BOOK NOW (₹${u.rate})
      </button>
    </div>`;
   }
  });
  document.getElementById("list").innerHTML=html || "<p style='text-align:center;'>ಯಾರೂ ಆನ್‌ಲೈನ್ ಇಲ್ಲ...</p>";
  document.getElementById("count").innerText=count+" online";
 });

 // ಕರೆಯ ಆಲಿಕೆ (Call Listener)
 onSnapshot(doc(db,"calls",uid), snap=>{
  if(snap.exists()){
   callData=snap.data();
   document.getElementById("popup").style.display="block";
   document.getElementById("caller").innerText="Incoming Call...";
  }
 });
});

// ವಿಡಿಯೋ ಸ್ಟ್ರಕ್ ಆಗದಂತೆ ಕಾಲ್ ಕನೆಕ್ಷನ್ (connect.html ಗೆ ಹೋಗುವಾಗ)
window.callUser = async(id)=>{
 let room="room_"+Date.now();
 await setDoc(doc(db,"calls",id),{from:uid, room:room});
 location.href=`connect.html?room=${room}&caller=true`;
};

// ... ಉಳಿದ ಚಾಟ್ ಮತ್ತು ಬುಕಿಂಗ್ ಫಂಕ್ಷನ್ ಹಾಗೆಯೇ ಇರಲಿ
</script>
