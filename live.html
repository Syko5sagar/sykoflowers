<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Users</title>
<style>
body{background:#000;color:white;font-family:sans-serif;margin:0}
.header{padding:15px;text-align:center;font-size:22px;color:#32cd32}
.user{display:flex;justify-content:space-between;background:#111;margin:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="header">RENT GIRLS & BOYS</div>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app=initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db=getFirestore(app);
const auth=getAuth(app);

let uid;

// USER LOAD
onAuthStateChanged(auth,user=>{
 if(!user){location.href="index.html";return;}
 uid=user.uid;

 // USERS LIST
 onSnapshot(collection(db,"users"),snap=>{
  let html="";
  snap.forEach(d=>{
   let u=d.data();
   if(u.uid!==uid){
    html+=`
    <div class="user">
      <div>${u.name}</div>
      <div>
        <button onclick="chat('${u.uid}')">💬</button>
        <button onclick="callUser('${u.uid}')">📹</button>
      </div>
    </div>`;
   }
  });
  list.innerHTML=html;
 });

 // INCOMING CALL
 onSnapshot(doc(db,"incomingCalls",uid),snap=>{
  if(snap.exists()){
   let data=snap.data();
   if(confirm("Incoming Call")){
    location.href=`connect.html?room=${data.room}`;
   }else{
    deleteDoc(doc(db,"incomingCalls",uid));
   }
  }
 });
});

// CHAT
window.chat=(id)=>{
 location.href=`chat.html?id=${id}`;
};

// CALL
window.callUser=async(id)=>{
 let room="room_"+Math.floor(Math.random()*1000000);

 await setDoc(doc(db,"incomingCalls",id),{
  room:room,
  from:uid
 });

 location.href=`connect.html?room=${room}&caller=true`;
};
</script>

</body>
</html>
