<!DOCTYPE html>
<html>
<body style="background:black;color:white">

<div id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSy...",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db=getFirestore(app);

const id=new URLSearchParams(location.search).get("chatID");
const ref=collection(db,"chats",id,"m");

window.send=async()=>{
 await addDoc(ref,{text:msg.value});
};

onSnapshot(ref,s=>{
 let h="";
 s.forEach(d=>h+=d.data().text+"<br>");
 chat.innerHTML=h;
});
</script>

</body>
</html>
