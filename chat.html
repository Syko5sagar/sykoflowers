<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid, chatId, otherId, unsubscribe;

// 🔐 LOGIN
onAuthStateChanged(auth, async (user)=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid=user.uid;

 const params=new URLSearchParams(location.search);
 otherId=params.get("id");
 const otherName=params.get("name");

 if(!otherId){
  alert("Invalid chat");
  location.href="live.html";
  return;
 }

 // 🔥 SAFE HEADER FIX
 const header = document.querySelector(".header");
 if(header){
  header.innerText = "💬 " + (otherName || "Chat");
 }

 // 🔥 LOAD OTHER USER PROFILE (NAME + DP)
 try{
  const snap = await getDoc(doc(db,"users",otherId));
  if(snap.exists()){
   const u = snap.data();

   // 👉 if you have image + name element add here
   if(document.getElementById("chatName")){
    document.getElementById("chatName").innerText = u.name;
   }
   if(document.getElementById("chatDp")){
    document.getElementById("chatDp").src = u.profilePic || "";
   }
  }
 }catch(e){
  console.log("Profile load error",e);
 }

 // 🔥 UNIQUE CHAT ID
 chatId = [uid, otherId].sort().join("_");

 loadMessages();
});

// 📩 LOAD
function loadMessages(){

 if(unsubscribe) unsubscribe();

 const q=query(
  collection(db,"chats",chatId,"messages"),
  orderBy("time")
 );

 unsubscribe = onSnapshot(q,snap=>{
  let html="";

  snap.forEach(d=>{
   let m=d.data();

   html+=`
   <div class="msg ${m.sender===uid?'me':'other'}">
    ${m.text}
   </div>`;
  });

  const msgBox = document.getElementById("messages");
  msgBox.innerHTML = html;

  // ✅ FIXED SCROLL
  setTimeout(()=>{
   msgBox.scrollTop = msgBox.scrollHeight;
  },100);
 });
}

// ✉ SEND
window.sendMsg = async ()=>{
 const input=document.getElementById("msg");
 const text=input.value.trim();

 if(!text) return;

 input.value="";

 await addDoc(collection(db,"chats",chatId,"messages"),{
  text:text,
  sender:uid,
  receiver:otherId,
  time:serverTimestamp()
 });
};

// ⌨ ENTER SEND
document.getElementById("msg").addEventListener("keypress",e=>{
 if(e.key==="Enter") sendMsg();
});
</script>
