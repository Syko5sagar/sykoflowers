<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid, chatId, otherId, unsubscribe;

// 🔐 LOGIN CHECK
onAuthStateChanged(auth,user=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid=user.uid;

 const params=new URLSearchParams(location.search);
 otherId=params.get("id");
 const otherName=params.get("name");

 if(!otherId){
  alert("Invalid chat");
  location.href="live.html";
  return;
 }

 // ✅ HEADER NAME SHOW
 document.querySelector(".header").innerText = "💬 " + (otherName || "Chat");

 // 🔥 UNIQUE CHAT ID (VERY IMPORTANT FIX)
 chatId = [uid, otherId].sort().join("_");

 loadMessages();
});

// 📩 LOAD MESSAGES (REALTIME BOTH SIDE)
function loadMessages(){

 if(unsubscribe) unsubscribe();

 const q=query(
  collection(db,"chats",chatId,"messages"),
  orderBy("time")
 );

 unsubscribe = onSnapshot(q,snap=>{
  let html="";

  snap.forEach(d=>{
   let m=d.data();

   html+=`
   <div class="msg ${m.sender===uid?'me':'other'}">
    ${m.text}
   </div>`;
  });

  document.getElementById("messages").innerHTML=html;

  setTimeout(()=>{
   messages.scrollTop=messages.scrollHeight;
  },100);
 });
}

// ✉ SEND MESSAGE
window.sendMsg = async ()=>{
 const input=document.getElementById("msg");
 const text=input.value.trim();

 if(!text) return;

 input.value="";

 await addDoc(collection(db,"chats",chatId,"messages"),{
  text:text,
  sender:uid,
  receiver:otherId, // ✅ IMPORTANT
  time:serverTimestamp()
 });
};

// 🔥 ENTER KEY SEND
document.getElementById("msg").addEventListener("keypress",e=>{
 if(e.key==="Enter") sendMsg();
});
</script>
