<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

.header{
background:linear-gradient(45deg,#ff0066,#ff6600);
padding:12px;
text-align:center;
font-weight:bold;
}

#messages{
height:75vh;
overflow-y:auto;
padding:10px;
}

.msg{
padding:8px;
margin:5px;
border-radius:8px;
max-width:70%;
}

.me{background:green;margin-left:auto}
.other{background:#333}

.box{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
padding:8px;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#ff0066;
color:#fff;
border:none;
padding:10px;
margin-left:5px;
}
.status{
font-size:12px;
text-align:center;
margin-top:2px;
}
</style>
</head>

<body>

<div class="header">💬 Chat</div>
<div class="status" id="status">loading...</div>

<div id="messages"></div>

<div class="box">
<input id="msg" placeholder="Type...">
<button onclick="sendMsg()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
authDomain:"sykolive-846a3.firebaseapp.com",
projectId:"sykolive-846a3"
});

const db=getFirestore(app);
const auth=getAuth(app);

let uid,chatId,otherId;

onAuthStateChanged(auth,async(user)=>{
if(!user){location.href="index.html";return;}

uid=user.uid;

const params=new URLSearchParams(location.search);
otherId=params.get("id");

if(!otherId){
document.getElementById("status").innerText="Invalid user";
return;
}

// 🔥 SAME CHAT ID FIX
chatId=[uid,otherId].sort().join("_");

loadHeader();
loadMessages();
});

// 👤 HEADER + ONLINE
async function loadHeader(){
const snap=await getDoc(doc(db,"users",otherId));

if(!snap.exists()) return;

const u=snap.data();

document.querySelector(".header").innerText="💬 "+u.name;

// 🔥 LIVE STATUS
let online=u.lastSeen && (Date.now()-u.lastSeen < 2*60*1000);

document.getElementById("status").innerText=online?"🟢 Online":"⚫ Offline";
}

// 📩 MESSAGES
function loadMessages(){

const q=query(
collection(db,"chats",chatId,"messages"),
orderBy("time")
);

onSnapshot(q,(snap)=>{
let html="";

snap.forEach(d=>{
let m=d.data();

html+=`
<div class="msg ${m.sender===uid?'me':'other'}">
${m.text}
</div>`;
});

let box=document.getElementById("messages");
box.innerHTML=html;
box.scrollTop=box.scrollHeight;
});
}

// ✉ SEND
window.sendMsg=async()=>{

let input=document.getElementById("msg");
let text=input.value.trim();
if(!text) return;

input.value="";

await addDoc(collection(db,"chats",chatId,"messages"),{
text,
sender:uid,
receiver:otherId,
time:serverTimestamp()
});
};

</script>

</body>
</html>
