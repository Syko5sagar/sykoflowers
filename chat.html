<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
 background:#000;
 color:white;
 display:flex;
 flex-direction:column;
 height:100vh;
}

/* HEADER */
.header{
 padding:12px;
 background:#111;
 border-bottom:1px solid #222;
 font-weight:bold;
 text-align:center;
}

/* MESSAGES */
#messages{
 flex:1;
 overflow-y:auto;
 padding:10px;
}

/* MESSAGE BUBBLE */
.msg{
 max-width:70%;
 padding:10px 15px;
 margin:8px;
 border-radius:15px;
 font-size:14px;
 word-wrap:break-word;
}

.me{
 background:#32cd32;
 color:black;
 margin-left:auto;
}

.other{
 background:#222;
 color:white;
 margin-right:auto;
}

/* INPUT */
.chat-input{
 display:flex;
 padding:10px;
 border-top:1px solid #222;
 background:#000;
}

.chat-input input{
 flex:1;
 padding:14px;
 border:none;
 border-radius:25px;
 background:#111;
 color:white;
 outline:none;
}

.chat-input button{
 margin-left:10px;
 border:none;
 width:45px;
 height:45px;
 border-radius:50%;
 background:linear-gradient(45deg,#ff007f,#7000ff);
 color:white;
 font-size:18px;
 display:flex;
 align-items:center;
 justify-content:center;
}
</style>
</head>

<body>

<div class="header">💬 Chat</div>

<div id="messages"></div>

<div class="chat-input">
 <input type="text" id="msg" placeholder="Type message...">
 <button onclick="sendMsg()">
  <i class="fa-solid fa-paper-plane"></i>
 </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid, chatId;

// GET USER
onAuthStateChanged(auth,user=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid=user.uid;

 const params=new URLSearchParams(location.search);
 const other=params.get("id");

 // UNIQUE CHAT ID
 chatId = uid < other ? uid+"_"+other : other+"_"+uid;

 loadMessages();
});

// LOAD MESSAGES
function loadMessages(){
 const q=query(collection(db,"chats",chatId,"messages"), orderBy("time"));

 onSnapshot(q,snap=>{
  let html="";
  snap.forEach(d=>{
   let m=d.data();

   html+=`
   <div class="msg ${m.sender===uid?'me':'other'}">
    ${m.text}
   </div>`;
  });

  document.getElementById("messages").innerHTML=html;

  // AUTO SCROLL
  messages.scrollTop=messages.scrollHeight;
 });
}

// SEND
window.sendMsg=async()=>{
 const text=document.getElementById("msg").value.trim();

 if(!text) return;

 document.getElementById("msg").value="";

 await addDoc(collection(db,"chats",chatId,"messages"),{
  text:text,
  sender:uid,
  time:Date.now()
 });
};
</script>

</body>
</html>
