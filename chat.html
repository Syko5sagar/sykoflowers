<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid, chatId, otherId, unsubscribe;

// 🔐 LOGIN
onAuthStateChanged(auth, async (user)=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid = user.uid;

 const params = new URLSearchParams(location.search);
 otherId = params.get("id");
 const otherName = params.get("name");

 if(!otherId){
  alert("Invalid chat");
  location.href="live.html";
  return;
 }

 chatId = [uid, otherId].sort().join("_");

 // 🔥 LOAD OTHER USER + STATUS
 loadUserHeader(otherId, otherName);

 loadMessages();
});


// 👤 PROFILE + ONLINE STATUS
async function loadUserHeader(id, fallbackName){

 try{
  const snap = await getDoc(doc(db,"users",id));

  if(snap.exists()){
   const u = snap.data();

   document.querySelector(".header").innerText = "💬 " + (u.name || fallbackName);

   // name
   if(document.getElementById("chatName")){
    document.getElementById("chatName").innerText = u.name;
   }

   // dp
   if(document.getElementById("chatDp")){
    document.getElementById("chatDp").src = u.profilePic || "https://via.placeholder.com/50";
   }

   // 🔥 LIVE ONLINE STATUS
   if(document.getElementById("status")){
    const isOnline = u.lastSeen && (Date.now() - u.lastSeen < 2 * 60 * 1000);

    document.getElementById("status").innerText = isOnline ? "🟢 Online" : "⚫ Offline";
   }
  }

 }catch(e){
  console.log(e);
 }
}


// 📩 LOAD MESSAGES (REAL TIME)
function loadMessages(){

 if(unsubscribe) unsubscribe();

 const q = query(
  collection(db,"chats",chatId,"messages"),
  orderBy("time")
 );

 unsubscribe = onSnapshot(q,(snap)=>{
  let html="";

  snap.forEach(d=>{
   let m = d.data();

   html += `
   <div class="msg ${m.sender===uid?'me':'other'}">
    ${m.text}
   </div>`;
  });

  const box = document.getElementById("messages");
  box.innerHTML = html;

  setTimeout(()=>{
   box.scrollTop = box.scrollHeight;
  },100);

 });
}


// ✉ SEND MESSAGE
window.sendMsg = async ()=>{

 const input = document.getElementById("msg");
 const text = input.value.trim();

 if(!text) return;

 input.value = "";

 await addDoc(collection(db,"chats",chatId,"messages"),{
  text:text,
  sender:uid,
  receiver:otherId,
  time:serverTimestamp()
 });
};


// ⌨ ENTER KEY
document.getElementById("msg").addEventListener("keypress",(e)=>{
 if(e.key==="Enter"){
  sendMsg();
 }
});

</script>
