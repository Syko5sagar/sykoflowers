<!DOCTYPE html>
<html>
<body style="background:black;color:white">

<div id="msgs"></div>
<input id="msg">
<button onclick="send()">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app=initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 projectId:"sykolive-846a3"
});

const db=getFirestore(app);
const auth=getAuth(app);

const id=new URLSearchParams(location.search).get("id");
const chatId=auth.currentUser.uid+"_"+id;

onSnapshot(collection(db,"chats",chatId,"msgs"),snap=>{
 let html="";
 snap.forEach(d=>{
  html+="<div>"+d.data().text+"</div>";
 });
 msgs.innerHTML=html;
});

window.send=async()=>{
 await addDoc(collection(db,"chats",chatId,"msgs"),{
  text:msg.value
 });
 msg.value="";
};
</script>

</body>
</html>
