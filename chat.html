<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

.header{
 background:linear-gradient(45deg,#ff0066,#ff6600);
 padding:12px;
 text-align:center;
 font-weight:bold;
}

.status{
 text-align:center;
 font-size:12px;
 margin-top:2px;
}

#messages{
 height:75vh;
 overflow-y:auto;
 padding:10px;
}

.msg{
 padding:8px;
 margin:5px;
 border-radius:8px;
 max-width:70%;
 word-wrap:break-word;
}

.me{background:green;margin-left:auto;text-align:right}
.other{background:#333}

.inputBox{
 display:flex;
 position:fixed;
 bottom:0;
 width:100%;
 background:#111;
 padding:8px;
}

input{
 flex:1;
 padding:10px;
 border:none;
 outline:none;
 border-radius:5px;
}

button{
 margin-left:5px;
 background:#ff0066;
 color:#fff;
 border:none;
 padding:10px;
 border-radius:5px;
}
</style>
</head>

<body>

<div class="header">💬 Chat</div>
<div class="status" id="status">Loading...</div>

<div id="messages"></div>

<div class="inputBox">
 <input id="msg" placeholder="Type message...">
 <button onclick="sendMsg()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid, chatId, otherId, unsubscribe;

// 🔐 LOGIN SAFE
onAuthStateChanged(auth, async (user)=>{
 if(!user){
  location.href="index.html";
  return;
 }

 uid = user.uid;

 const params = new URLSearchParams(location.search);
 otherId = params.get("id");

 if(!otherId){
  document.getElementById("status").innerText = "Invalid chat user";
  return;
 }

 chatId = [uid, otherId].sort().join("_");

 loadHeader();
 loadMessages();
});


// 👤 HEADER + ONLINE STATUS SAFE
async function loadHeader(){

 try{
  const snap = await getDoc(doc(db,"users",otherId));

  if(!snap.exists()){
   document.querySelector(".header").innerText = "💬 Chat";
   document.getElementById("status").innerText = "User not found";
   return;
  }

  const u = snap.data();

  document.querySelector(".header").innerText = "💬 " + (u.name || "Chat");

  const online = u.lastSeen && (Date.now() - u.lastSeen < 2*60*1000);

  document.getElementById("status").innerText =
   online ? "🟢 Online" : "⚫ Offline";

 }catch(e){
  console.log(e);
  document.getElementById("status").innerText = "Status error";
 }
}


// 📩 LOAD MESSAGES SAFE
function loadMessages(){

 try{

  if(unsubscribe) unsubscribe();

  const q = query(
   collection(db,"chats",chatId,"messages"),
   orderBy("time")
  );

  unsubscribe = onSnapshot(q,(snap)=>{

   let html="";

   snap.forEach(d=>{
    let m = d.data();

    html += `
    <div class="msg ${m.sender===uid?'me':'other'}">
     ${m.text || ""}
    </div>`;
   });

   const box = document.getElementById("messages");
   if(box){
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
   }

  });

 }catch(e){
  console.log("Chat load error",e);
 }
}


// ✉ SEND SAFE
window.sendMsg = async ()=>{

 try{

  const input = document.getElementById("msg");
  const text = input.value.trim();

  if(!text) return;

  input.value = "";

  await addDoc(collection(db,"chats",chatId,"messages"),{
   text:text,
   sender:uid,
   receiver:otherId,
   time:serverTimestamp()
  });

 }catch(e){
  console.log("Send error",e);
 }
};


// ⌨ ENTER KEY SAFE
document.addEventListener("keypress",(e)=>{
 if(e.key==="Enter"){
  sendMsg();
 }
});

</script>

</body>
</html>
