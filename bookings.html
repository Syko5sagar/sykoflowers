<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
 authDomain:"sykolive-846a3.firebaseapp.com",
 projectId:"sykolive-846a3"
});

const db = getFirestore(app);
const auth = getAuth(app);

let unsubscribe;

// 🔐 LOGIN CHECK
onAuthStateChanged(auth, user => {
 if (!user) {
  location.href = "index.html";
  return;
 }

 // 🔥 ONLY MY BOOKINGS
 const q = query(
  collection(db, "bookings"),
  where("bookerId","==", user.uid),
  orderBy("time","desc")
 );

 // prevent duplicate listener
 if(unsubscribe) unsubscribe();

 unsubscribe = onSnapshot(q, (snap) => {

  let html = "";

  if (snap.empty) {
   html = "<div class='no-data'>ಯಾವುದೇ ಬುಕಿಂಗ್‌ಗಳು ಕಂಡುಬಂದಿಲ್ಲ.</div>";
  }

  snap.forEach(doc => {
   const b = doc.data();

   html += `
    <div class="booking-card">
     <div class="row">
      <span class="label">ಬುಕ್ ಮಾಡಿದವರು:</span>
      <span class="value">${b.bookerName || "User"}</span>
     </div>

     <div class="row">
      <span class="label">ಯಾರನ್ನು ಬುಕ್ ಮಾಡಲಾಗಿದೆ:</span>
      <span class="value" style="color:#ff007f;">
       ${b.targetName || "Unknown"}
      </span>
     </div>

     <div class="row">
      <span class="label">ಸಮಯ:</span>
      <span class="value">${b.time || "-"}</span>
     </div>

     <div class="row" style="border-top:1px solid #232d36;padding-top:8px;margin-top:8px;">
      <span class="status">${b.status || "Done"}</span>
      <span class="amount">₹${b.amount || 0}</span>
     </div>
    </div>
   `;
  });

  document.getElementById("bookingList").innerHTML = html;

 });
});
</script>
