<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ",
    authDomain: "sykolive-846a3.firebaseapp.com",
    projectId: "sykolive-846a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let base64Image = "";

// 🔐 Ensure user loaded
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
    } else {
        alert("Login first!");
        window.location.href = "index.html";
    }
});

// 📸 Image preview
document.getElementById('fileInput').addEventListener('change', function () {
    const file = this.files[0];

    if (file && file.size > 500000) {
        alert("Image too large (max 500KB)");
        return;
    }

    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Image = e.target.result;
            document.getElementById('previewImg').src = base64Image;
            document.getElementById('previewImg').style.display = 'block';
            document.getElementById('camIcon').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
});

// 💾 Save profile
document.getElementById('saveBtn').addEventListener('click', async () => {

    if (!currentUser) {
        alert("User not ready, try again");
        return;
    }

    const name = document.getElementById('userName').value.trim();
    const gender = document.getElementById('userGender').value;
    const age = parseInt(document.getElementById('userAge').value);
    const rate = parseInt(document.getElementById('userRate').value);

    // ✅ Validation
    if (!name || !age || !rate || !base64Image) {
        alert("ಎಲ್ಲ ವಿವರ ತುಂಬಿರಿ!");
        return;
    }

    if (age < 18 || age > 60) {
        alert("ವಯಸ್ಸು ಸರಿಯಾಗಿ ಹಾಕಿ (18-60)");
        return;
    }

    if (rate <= 0) {
        alert("ಸರಿಯಾದ ಮೊತ್ತ ಹಾಕಿ");
        return;
    }

    try {
        await setDoc(doc(db, "users", currentUser.uid), {
            uid: currentUser.uid,
            name,
            gender,
            age,
            rate,
            profilePic: base64Image,
            isOnline: true,
            lastSeen: Date.now()
        });

        alert("Profile saved successfully!");

        // ✅ correct redirect
        window.location.href = "live-user.html";

    } catch (err) {
        alert("Error: " + err.message);
    }
});
</script>
