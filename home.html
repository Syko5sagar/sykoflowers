<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Rent App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .upload-container { 
            width: 100%; max-width: 400px; background: #111; 
            padding: 30px; border-radius: 25px; border: 2px solid #32cd32; 
            text-align: center; box-shadow: 0 0 20px rgba(50, 205, 50, 0.2);
        }
        
        h2 { color: #ff0000; margin-bottom: 25px; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }

        .photo-upload { 
            width: 120px; height: 120px; background: #222; 
            border: 2px dashed #ff0000; border-radius: 50%; 
            margin: 0 auto 25px; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; overflow: hidden; position: relative; 
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .photo-upload i { font-size: 40px; color: #32cd32; }

        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; color: #32cd32; font-size: 13px; margin-bottom: 6px; font-weight: 600; }
        input { 
            width: 100%; padding: 12px; background: #000; 
            border: 1px solid #ff0000; border-radius: 12px; 
            color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #32cd32; box-shadow: 0 0 8px rgba(50, 205, 50, 0.3); }

        .save-btn { 
            width: 100%; padding: 15px; background: #32cd32; 
            color: #000; border: none; border-radius: 12px; 
            font-weight: 800; font-size: 18px; cursor: pointer; 
            margin-top: 10px; transition: 0.3s; 
        }
        .save-btn:hover { background: #ff0000; color: #fff; }
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>ಪ್ರೊಫೈಲ್ ಸೆಟ್ ಮಾಡಿ</h2>
        
        <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-camera-retro" id="camIcon"></i>
            <img id="previewImg" style="display:none;">
        </div>
        <input type="file" id="fileInput" style="display: none;" accept="image/*">

        <div class="input-group">
            <label>ನಿಮ್ಮ ಹೆಸರು:</label>
            <input type="text" id="userName" placeholder="ಹೆಸರನ್ನು ಇಲ್ಲಿ ಬರೆಯಿರಿ">
        </div>

        <div class="input-group">
            <label>ನಿಮ್ಮ ವಯಸ್ಸು:</label>
            <input type="number" id="userAge" placeholder="ವಯಸ್ಸು ಹಾಕಿ">
        </div>

        <div class="input-group">
            <label>ದಿನದ ರೇಟ್ (Amount ₹):</label>
            <input type="number" id="userRate" placeholder="ಉದಾ: 500">
        </div>

        <button class="save-btn" id="saveBtn">ಸೇವ್ ಮಾಡಿ & ಮುಂದುವರಿಯಿರಿ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ನಿಮ್ಮ Firebase ಕಾನ್ಫಿಗರೇಶನ್
        const firebaseConfig = { 
            apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
            authDomain: "sykolive-846a3.firebaseapp.com", 
            projectId: "sykolive-846a3" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let base64Image = "";

        // ಫೋಟೋ ಅಪ್ಲೋಡ್ ರೀಡರ್
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result;
                    document.getElementById('previewImg').src = base64Image;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('camIcon').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // ಸೇವ್ ಬಟನ್ ಲಾಜಿಕ್
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const name = document.getElementById('userName').value;
            const age = document.getElementById('userAge').value;
            const rate = document.getElementById('userRate').value;

            if (user && name && age && rate && base64Image) {
                try {
                    // ಡೇಟಾ ಸೇವ್ ಮಾಡಲಾಗುತ್ತಿದೆ
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: name,
                        age: age,
                        rate: rate,
                        profilePic: base64Image,
                        timestamp: Date.now()
                    });

                    console.log("Profile Saved Successfully!");
                    
                    // ಮುಂದಿನ ಪುಟಕ್ಕೆ ಹೋಗುವುದು
                    // ಗಮನಿಸಿ: GitHub ನಲ್ಲಿ live_users.html ಫೈಲ್ ಸರಿಯಾಗಿರಲಿ
                    window.location.href = "live_users.html";

                } catch (error) {
                    console.error("Firebase Save Error:", error);
                    alert("ಸೇವ್ ಮಾಡಲು ಸಾಧ್ಯವಾಗುತ್ತಿಲ್ಲ: " + error.message);
                }
            } else {
                alert("ದಯವಿಟ್ಟು ಫೋಟೋ, ಹೆಸರು, ವಯಸ್ಸು ಮತ್ತು ಅಮೌಂಟ್ ಎಲ್ಲವನ್ನೂ ಭರ್ತಿ ಮಾಡಿ!");
            }
        });

        // ಲಾಗಿನ್ ಇಲ್ಲದಿದ್ದರೆ ವಾಪಸ್ ಕಳುಹಿಸಲು
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                console.log("No user logged in, redirecting...");
                window.location.href = "index.html"; 
            }
        });
    </script>
</body>
</html>
