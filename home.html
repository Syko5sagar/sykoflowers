<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - Rent App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .upload-container { width: 100%; max-width: 400px; background: #111; padding: 30px; border-radius: 25px; border: 2px solid #32cd32; text-align: center; }
        h2 { color: #ff0000; margin-bottom: 25px; text-transform: uppercase; font-size: 18px; }
        .photo-upload { width: 110px; height: 110px; background: #222; border: 2px dashed #ff0000; border-radius: 50%; margin: 0 auto 25px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .photo-upload i { font-size: 35px; color: #32cd32; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; color: #32cd32; font-size: 13px; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #ff0000; border-radius: 12px; color: white; outline: none; }
        .save-btn { width: 100%; padding: 15px; background: #32cd32; color: #000; border: none; border-radius: 12px; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>ಪ್ರೊಫೈಲ್ ಸೆಟ್ ಮಾಡಿ</h2>
        <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-camera" id="camIcon"></i>
            <img id="previewImg" style="display:none;">
        </div>
        <input type="file" id="fileInput" style="display: none;" accept="image/*">

        <div class="input-group">
            <label>ಹೆಸರು:</label>
            <input type="text" id="userName" placeholder="ಬರೆಯಿರಿ">
        </div>
        <div class="input-group">
            <label>ವಯಸ್ಸು:</label>
            <input type="number" id="userAge" placeholder="ವಯಸ್ಸು">
        </div>
        <div class="input-group">
            <label>ದಿನದ ಬಾಡಿಗೆ (₹):</label>
            <input type="number" id="userRate" placeholder="ಮೊತ್ತ">
        </div>
        <button class="save-btn" id="saveBtn">ಸೇವ್ ಮಾಡಿ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ನಿಮ್ಮ Firebase ಕಾನ್ಫಿಗರೇಶನ್
        const firebaseConfig = { 
            apiKey: "AIzaSyCZl507ZDCKEEok8tn8GXoKaWdvhhSbNlQ", 
            authDomain: "sykolive-846a3.firebaseapp.com", 
            projectId: "sykolive-846a3" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let base64Image = "";

        // ಫೋಟೋ ಸೆಲೆಕ್ಟ್ ಮಾಡಿದಾಗ ಪ್ರಿವ್ಯೂ ತೋರಿಸಲು
        document.getElementById('fileInput').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result;
                    document.getElementById('previewImg').src = base64Image;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('camIcon').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // ಸೇವ್ ಬಟನ್ ಮತ್ತು ಪೇಜ್ ರಿಡೈರೆಕ್ಟ್ ಲಾಜಿಕ್
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const user = auth.currentUser;
            const name = document.getElementById('userName').value;
            const age = document.getElementById('userAge').value;
            const rate = document.getElementById('userRate').value;

            if (user && name && age && rate && base64Image) {
                
                // ನೀವು ಕೇಳಿದ ಆ ಪರ್ಫೆಕ್ಟ್ ಫೈರ್‌ಬೇಸ್ ಸೇವ್ ಲಾಜಿಕ್ ಇಲ್ಲಿದೆ:
                try {
                    await setDoc(doc(db, "users", user.uid), {
                        uid: user.uid,
                        name: name,
                        age: age,
                        rate: rate,
                        profilePic: base64Image,
                        timestamp: Date.now()
                    });

                    console.log("Saved!");
                    
                    // ಗಿಟ್‌ಹಬ್ ಪೇಜಸ್‌ನಲ್ಲಿ ರಿಡೈರೆಕ್ಟ್ ಆಗಲು ಇದು ಬೆಸ್ಟ್ ದಾರಿ
                    let nextPath = window.location.pathname.replace("home.html", "live_users.html");
                    
                    // ಒಂದು ವೇಳೆ URL ನಲ್ಲಿ home.html ಇಲ್ಲದಿದ್ದರೂ ಕೆಲಸ ಮಾಡಲು:
                    if (!nextPath.includes("live_users.html")) {
                         nextPath = nextPath.endsWith('/') ? nextPath + "live_users.html" : nextPath + "/live_users.html";
                    }
                    
                    window.location.href = nextPath;

                } catch (error) {
                    console.error("Error saving to Firestore:", error);
                    alert("ದೋಷ: " + error.message + "\nFirestore Rules ಪಬ್ಲಿಷ್ ಆಗಿದೆಯೇ ಚೆಕ್ ಮಾಡಿ!");
                }
            } else {
                alert("ದಯವಿಟ್ಟು ಎಲ್ಲ ವಿವರಗಳನ್ನು ಮತ್ತು ಫೋಟೋವನ್ನು ಭರ್ತಿ ಮಾಡಿ!");
            }
        });
    </script>
</body>
</html>
